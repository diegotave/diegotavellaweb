<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diego Tavella — About</title>
  <link rel="stylesheet" href="index.css?v=4">
  <style>
    #intro-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Left panel — blend modes */
    #blend-panel-left {
      position: fixed;
      left: 16px;
      top: 10px;
      bottom: 10px;
      z-index: 700;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
    }
    #blend-list-left {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    #blend-list-left li {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #000;
      cursor: pointer;
      opacity: 0.35;
      padding: 2px 0;
      transition: opacity 120ms ease, font-size 180ms ease;
      white-space: nowrap;
      text-align: left;
    }
    #blend-list-left li:hover  { opacity: 0.7; font-size: 16px; }
    #blend-list-left li.active { opacity: 1; font-weight: 700; }
    body.dark   #blend-list-left li { color: #fff; }
    body.orange #blend-list-left li { color: #000; }
    body.red    #blend-list-left li { color: #000; }
  </style>
</head>
<body class="orange"><script>(function(){var t=localStorage.getItem("theme")||"orange";document.body.className=t==="dark"?"dark":t==="light"?"light":t==="red"?"red":"orange";})()</script>

  <div id="stage">
    <video id="intro-video" muted playsinline>
      <source src="assets/videos/introabout.webm" type='video/webm; codecs="vp9"'>
    </video>
  </div>

  <!-- Right panel: color themes -->
  <div id="blend-panel">
    <ul id="blend-list">
      <li data-theme="orange">orange<br>version</li>
      <li data-theme="red">red<br>version</li>
      <li data-theme="dark">dark<br>version</li>
      <li data-theme="white">white<br>version</li>
    </ul>
  </div>

  <!-- Left panel: blend modes + invert -->
  <div id="blend-panel-left">
    <ul id="blend-list-left">
      <li data-blend="normal" class="active">normal</li>
      <li data-blend="multiply">multiply</li>
      <li data-blend="screen">screen</li>
      <li data-blend="overlay">overlay</li>
      <li data-blend="hard-light">hard-light</li>
      <li data-blend="exclusion">exclusion</li>
      <li data-blend="difference">difference</li>
      <li data-blend="luminosity">luminosity</li>
      <li data-blend="hue">hue</li>
      <li data-blend="color">color</li>
      <li data-invert>invert</li>
      <li data-loop>loop off</li>
    </ul>
  </div>

  <script>
    const vid = document.getElementById("intro-video");

    vid.addEventListener("ended", () => {
      vid.currentTime = vid.duration;
    });

    vid.play().catch(() => {});

    // Right panel: color themes
    document.querySelectorAll("#blend-list li").forEach(li => {
      li.addEventListener("click", () => {
        if (!li.dataset.theme) return;
        document.body.classList.remove("dark", "orange", "red", "light");
        if      (li.dataset.theme === "orange") { document.body.classList.add("orange"); localStorage.setItem("theme","orange"); }
        else if (li.dataset.theme === "red")    { document.body.classList.add("red");    localStorage.setItem("theme","red"); }
        else if (li.dataset.theme === "dark")   { document.body.classList.add("dark");   localStorage.setItem("theme","dark"); }
        else                                    { localStorage.setItem("theme","light"); }
      });
    });

    // Left panel: blend modes + invert + loop
    let inverted = false;

    document.querySelectorAll("#blend-list-left li").forEach(li => {
      li.addEventListener("click", () => {
        if ("invert" in li.dataset) {
          inverted = !inverted;
          vid.style.filter = inverted ? "invert(1)" : "";
          li.classList.toggle("active", inverted);
        } else if ("loop" in li.dataset) {
          vid.loop = !vid.loop;
          li.textContent = vid.loop ? "loop on" : "loop off";
          li.classList.toggle("active", vid.loop);
          if (vid.loop && vid.ended) vid.play().catch(() => {});
        } else if (li.dataset.blend) {
          document.querySelectorAll("#blend-list-left li[data-blend]").forEach(el => el.classList.remove("active"));
          li.classList.add("active");
          vid.style.mixBlendMode = li.dataset.blend;
        }
      });
    });
  </script>

</body>
</html>
