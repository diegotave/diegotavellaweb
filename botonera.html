<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botonera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, var(--card-size));
    grid-template-rows: repeat(3, var(--card-size));
    gap: var(--card-gap);
    --card-size: min(12.35vw, 237px);
    --card-gap: min(1.625vw, 31px);
  }

  .card {
    width: var(--card-size);
    height: var(--card-size);
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s cubic-bezier(0.34, 1.45, 0.64, 1);
  }

  /* El lottie container ocupa todo el card y desborda al expandirse */
  .card__lottie {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    /* cuando se expande, el SVG crece más que el card — lo dejamos desbordar */
    overflow: visible;
  }

  /* Overlay de título */
  /* Imagen dentro del hueco — clip-path manejado desde JS en sync con Lottie */
  .card__thumb {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    object-fit: cover;
    pointer-events: none;
    z-index: 0;
    /* clip-path seteado por JS */
  }

  .card__lottie { z-index: 1; }

  .card__label {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: 11px;
    color: #000;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    background: rgba(255,255,255,0.7);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .card.expanded .card__label {
    opacity: 1;
  }
</style>
</head>
<body>

<div class="grid" id="grid">
  <!-- cards generadas por JS -->
</div>

<script>
const ANIM_DATA = {"v":"5.9.0","fr":30,"ip":0,"op":16,"w":488,"h":353,"nm":"BOTON VIDEO","ddd":0,"assets":[],"layers":[{"ddd":0,"ind":1,"ty":3,"nm":"Null 9","sr":1,"ks":{"o":{"a":0,"k":0,"ix":11},"r":{"a":0,"k":0,"ix":10},"p":{"a":0,"k":[244,176,0],"ix":2,"l":2},"a":{"a":0,"k":[0,0,0],"ix":1,"l":2},"s":{"a":0,"k":[100,100,100],"ix":6,"l":2}},"ao":0,"ip":0,"op":12310,"st":0,"bm":0},{"ddd":0,"ind":2,"ty":4,"nm":"Shape Layer 2","parent":1,"td":1,"sr":1,"ks":{"o":{"a":0,"k":100,"ix":11},"r":{"a":0,"k":0,"ix":10},"p":{"a":0,"k":[0,0,0],"ix":2,"l":2},"a":{"a":0,"k":[0,0,0],"ix":1,"l":2},"s":{"a":0,"k":[94,94,100],"ix":6,"l":2}},"ao":0,"shapes":[{"ty":"gr","it":[{"ty":"rc","d":1,"s":{"a":1,"k":[{"i":{"x":[0.833,0.833],"y":[0.833,0.833]},"o":{"x":[0.333,0.333],"y":[0,0]},"t":1,"s":[304.126,303.14]},{"t":8,"s":[481.726,337.426]}],"ix":2},"p":{"a":0,"k":[0,0],"ix":3},"r":{"a":1,"k":[{"i":{"x":[0.833],"y":[0.833]},"o":{"x":[0.333],"y":[0]},"t":1,"s":[331]},{"t":8,"s":[39.5]}],"ix":4},"nm":"Rectangle Path 1","mn":"ADBE Vector Shape - Rect","hd":false},{"ty":"st","c":{"a":0,"k":[1,1,1,1],"ix":3},"o":{"a":0,"k":100,"ix":4},"w":{"a":0,"k":2,"ix":5},"lc":1,"lj":1,"ml":4,"bm":0,"nm":"Stroke 1","mn":"ADBE Vector Graphic - Stroke","hd":false},{"ty":"fl","c":{"a":0,"k":[0,0,0,1],"ix":4},"o":{"a":0,"k":100,"ix":5},"r":1,"bm":0,"nm":"Fill 1","mn":"ADBE Vector Graphic - Fill","hd":false},{"ty":"tr","p":{"a":0,"k":[-0.541,-0.389],"ix":2},"a":{"a":0,"k":[0,0],"ix":1},"s":{"a":0,"k":[100,100],"ix":3},"r":{"a":0,"k":0,"ix":6},"o":{"a":0,"k":100,"ix":7},"sk":{"a":0,"k":0,"ix":4},"sa":{"a":0,"k":0,"ix":5},"nm":"Transform"}],"nm":"Rectangle 1","np":3,"cix":2,"bm":0,"ix":1,"mn":"ADBE Vector Group","hd":false}],"ip":0,"op":12310,"st":0,"bm":0},{"ddd":0,"ind":3,"ty":4,"nm":"Shape Layer 1","parent":1,"tt":2,"sr":1,"ks":{"o":{"a":0,"k":100,"ix":11},"r":{"a":0,"k":0,"ix":10},"p":{"a":0,"k":[0,0,0],"ix":2,"l":2},"a":{"a":0,"k":[0,0,0],"ix":1,"l":2},"s":{"a":0,"k":[100,100,100],"ix":6,"l":2}},"ao":0,"shapes":[{"ty":"gr","it":[{"ty":"rc","d":1,"s":{"a":1,"k":[{"i":{"x":[0.833,0.833],"y":[0.833,0.833]},"o":{"x":[0.333,0.333],"y":[0,0]},"t":1,"s":[308.426,308.426]},{"t":8,"s":[475.426,338.426]}],"ix":2},"p":{"a":0,"k":[0,0],"ix":3},"r":{"a":1,"k":[{"i":{"x":[0.833],"y":[0.833]},"o":{"x":[0.333],"y":[0]},"t":1,"s":[331]},{"t":8,"s":[47]}],"ix":4},"nm":"Rectangle Path 1","mn":"ADBE Vector Shape - Rect","hd":false},{"ty":"st","c":{"a":0,"k":[1,1,1,1],"ix":3},"o":{"a":0,"k":100,"ix":4},"w":{"a":0,"k":2,"ix":5},"lc":1,"lj":1,"ml":4,"bm":0,"nm":"Stroke 1","mn":"ADBE Vector Graphic - Stroke","hd":false},{"ty":"fl","c":{"a":0,"k":[0,0,0,1],"ix":4},"o":{"a":0,"k":100,"ix":5},"r":1,"bm":0,"nm":"Fill 1","mn":"ADBE Vector Graphic - Fill","hd":false},{"ty":"tr","p":{"a":0,"k":[-0.541,-0.389],"ix":2},"a":{"a":0,"k":[0,0],"ix":1},"s":{"a":0,"k":[100,100],"ix":3},"r":{"a":0,"k":0,"ix":6},"o":{"a":0,"k":100,"ix":7},"sk":{"a":0,"k":0,"ix":4},"sa":{"a":0,"k":0,"ix":5},"nm":"Transform"}],"nm":"Rectangle 1","np":3,"cix":2,"bm":0,"ix":1,"mn":"ADBE Vector Group","hd":false}],"ip":0,"op":12310,"st":0,"bm":0}],"markers":[]};

const R2 = "https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev";

const CARDS = [
  { label: "demo reel", video: "WORKS/video1/video1reel.mp4", thumb: `${R2}/WORKS/video1/thumbv1.png` },
  { label: "",          video: null,                          thumb: null },
  { label: "",          video: null,                          thumb: null },
  { label: "trailer",   video: "WORKS/video4/video4.mp4",    thumb: `${R2}/WORKS/video4/thumbv4.png` },
  { label: "",          video: null,                          thumb: null },
  { label: "",          video: null,                          thumb: null },
  { label: "",          video: null,                          thumb: null },
  { label: "",          video: null,                          thumb: null },
  { label: "",          video: "WORKS/video9/video9.mp4",    thumb: `${R2}/WORKS/video9/thumbv9.png` },
];

const grid = document.getElementById('grid');
const anims = [];
let activeIndex = null;

// Crear cards
CARDS.forEach((data, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = i;

  // Imagen — va antes del lottieDiv para quedar detrás (z-index)
  if (data.thumb) {
    const img = document.createElement('img');
    img.className = 'card__thumb';
    img.src = data.thumb;
    img.alt = data.label || '';
    img.loading = 'lazy';
    card.appendChild(img);
  }

  const lottieDiv = document.createElement('div');
  lottieDiv.className = 'card__lottie';
  card.appendChild(lottieDiv);

  if (data.label) {
    const label = document.createElement('div');
    label.className = 'card__label';
    label.textContent = data.label;
    card.appendChild(label);
  }

  grid.appendChild(card);

  // Inicializar animación Lottie por card
  const anim = lottie.loadAnimation({
    container: lottieDiv,
    renderer: 'svg',
    loop: false,
    autoplay: false,
    animationData: JSON.parse(JSON.stringify(ANIM_DATA)) // copia independiente
  });

  // Arrancar en frame 0 (círculo)
  anim.goToAndStop(0, true);

  // Sync clip-path de la imagen con cada frame del Lottie
  const img = card.querySelector('.card__thumb');
  if (img) {
    // Valores calculados desde formathumb.json
    // Comp 488×353, Null scale 96%, card cuadrado con meet (letterbox vertical)
    // scale = card/488 → SVG height renderizada = 353/488 * card = 0.7234*card
    // letterbox top/bottom = (1 - 0.7234) / 2 = 0.1383*card
    // Shape center en card: x≈49.9%, y≈49.8% → prácticamente centrado
    //
    // CÍRCULO (frame 1): size 308.426×308.426 * 0.96 = 296.09px en comp
    //   rendered = 296.09/488 = 60.68% de card
    //   inset T/B ≈ 19.5%  inset L/R ≈ 19.6%  round = 30.3% (=50% del box)
    //
    // RECT (frame 8): size 475.426×338.426 * 0.96 = 456.4×324.9px en comp
    //   rendered W = 456.4/488 = 93.5%  H = 324.9/488 = 66.6%
    //   inset T/B ≈ 16.6%  inset L/R ≈ 3.1%  round = 9.25% (=47*0.96/488)
    const CIRCLE = { iT: 19.5, iB: 19.5, iL: 19.6, iR: 19.6, round: 30.3 };
    const RECT   = { iT: 16.6, iB: 16.9, iL:  3.1, iR:  3.1, round:  9.25 };

    function lerp(a, b, t) { return a + (b - a) * t; }

    // Easing exacto del Lottie: o={x:0.333,y:0} i={x:0.833,y:0.833}
    // = cubic-bezier(0.333, 0, 0.833, 0.833)
    function cubicBezier(p1x, p1y, p2x, p2y) {
      return function(t) {
        // Newton-Raphson para resolver x → obtener y
        function sampleCurveX(t) {
          return ((1 - 3*p2x + 3*p1x)*t + (3*p2x - 6*p1x))*t*t + 3*p1x*t*t*t - 3*p1x*t*t + 3*p1x*t;
        }
        // Simplificado para perf: uso de aproximación directa
        const cx = 3*p1x, bx = 3*(p2x-p1x)-cx, ax = 1-cx-bx;
        const cy = 3*p1y, by = 3*(p2y-p1y)-cy, ay = 1-cy-by;
        function sampleX(t){ return ((ax*t+bx)*t+cx)*t; }
        function sampleY(t){ return ((ay*t+by)*t+cy)*t; }
        function sampleDX(t){ return (3*ax*t+2*bx)*t+cx; }
        // Newton-Raphson
        let tt = t;
        for (let i = 0; i < 8; i++) {
          const x = sampleX(tt) - t;
          if (Math.abs(x) < 1e-6) break;
          tt -= x / (sampleDX(tt) || 1);
        }
        return sampleY(tt);
      };
    }
    const ease = cubicBezier(0.333, 0, 0.833, 0.833);

    img.style.clipPath = `inset(${CIRCLE.iT}% ${CIRCLE.iR}% ${CIRCLE.iB}% ${CIRCLE.iL}% round ${CIRCLE.round}%)`;

    anim.addEventListener('enterFrame', (e) => {
      // Animación keyframes en frames 1→8, total 7 frames
      const t = ease(Math.max(0, Math.min(1, (e.currentTime - 1) / 7)));
      const iT = lerp(CIRCLE.iT, RECT.iT, t);
      const iB = lerp(CIRCLE.iB, RECT.iB, t);
      const iL = lerp(CIRCLE.iL, RECT.iL, t);
      const iR = lerp(CIRCLE.iR, RECT.iR, t);
      const r  = lerp(CIRCLE.round, RECT.round, t);
      img.style.clipPath = `inset(${iT}% ${iR}% ${iB}% ${iL}% round ${r}%)`;
    });
  }

  anims.push(anim);
});

// Helpers de grilla
function getPos(i) { return { col: i % 3, row: Math.floor(i / 3) }; }

function getNeighborPush(activeIdx, neighborIdx) {
  const a = getPos(activeIdx);
  const n = getPos(neighborIdx);
  const dx = n.col - a.col;
  const dy = n.row - a.row;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len === 0) return { x: 0, y: 0 };
  const PUSH = 10; // px
  return { x: (dx / len) * PUSH, y: (dy / len) * PUSH };
}

const cards = Array.from(grid.querySelectorAll('.card'));

function expand(i) {
  if (activeIndex === i) return;
  collapse();
  activeIndex = i;

  cards[i].classList.add('expanded');
  anims[i].setDirection(1);
  anims[i].play();

  // Empujar vecinos
  cards.forEach((card, j) => {
    if (j === i) return;
    const push = getNeighborPush(i, j);
    card.style.transform = `translate(${push.x}px, ${push.y}px)`;
  });
}

function collapse() {
  if (activeIndex === null) return;
  const prev = activeIndex;
  cards[prev].classList.remove('expanded');
  anims[prev].setDirection(-1);
  anims[prev].play();
  activeIndex = null;

  // Reset vecinos
  cards.forEach(card => card.style.transform = '');
}

// Eventos
cards.forEach((card, i) => {
  card.addEventListener('mouseenter', () => expand(i));
});

grid.addEventListener('mouseleave', () => collapse());

// Click solo si está expandido
cards.forEach((card, i) => {
  card.addEventListener('click', () => {
    if (!card.classList.contains('expanded')) return;
    // Acá después conectás el video player
    console.log('abrir video del card', i);
    alert(`Card ${i + 1} — conectar video acá`);
  });
});
</script>
