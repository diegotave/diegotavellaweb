<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="rgb(255, 170, 0)">
  <title>Diego Tavella</title>
  <link rel="stylesheet" href="index.css?v=4">
  <style>
    /* los botones quedan por encima del logo para no quedar bloqueados */
    #boton-hit, #boton-hit-cuadrado { z-index: 650; }

    #vhs-reverse {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      height: calc(100% - 20px);
      width: auto;
      display: block;
      z-index: 2;
      mix-blend-mode: exclusion;
      pointer-events: none;
      opacity: 0;
    }
    #vhs-reverse.active                { opacity: 1; }
    body.dark   #vhs-reverse           { mix-blend-mode: hard-light; filter: invert(1); }
    body.orange #vhs-reverse,
    body.red    #vhs-reverse           { mix-blend-mode: multiply;   filter: invert(1); }
  </style>
  <link rel="preload" href="assets/videos/introwork.webm" as="video" type="video/webm">
  <script>if(sessionStorage.getItem("pushBack")==="1"){document.documentElement.dataset.pushBack="1"}</script>
</head>
<body class="orange"><script>(function(){var t=localStorage.getItem("theme")||"orange";document.body.className=t==="dark"?"dark":t==="light"?"":t==="red"?"red":"orange";})()</script>

  <div id="stage">
    <div id="boton-demo" style="opacity:1"><div id="boton-circulo"></div><svg id="boton-circulo-negro" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="mask-negro">
            <rect width="100" height="100" fill="white"/>
            <text x="100" y="50" text-anchor="end" dominant-baseline="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="19.2" fill="black"><tspan font-weight="400">play</tspan><tspan font-weight="700" font-style="italic">demo</tspan></text>
          </mask>
        </defs>
        <circle cx="50" cy="50" r="49" fill="black" mask="url(#mask-negro)"/>
      </svg><div id="boton-cuadrado"><div id="boton-fondo"></div><svg id="boton-figura" viewBox="0 0 222.3876 214.063" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="play-mask">
      <rect width="222.3876" height="214.063" fill="white"/>
      <path id="play-mask-path" fill="black" transform="translate(67.76,48.26) scale(0.72)" d="M17.3353,2.0513l98.7013,70.2095c6.1132,4.3485,6.1583,13.4121.0887,17.8213L18.2873,161.1548c-7.2294,5.2517-17.3692.1237-17.4238-8.8117L.0002,11.0609C-.0544,2.1141,10.0447-3.1347,17.3353,2.0513Z"/>
    </mask>
  </defs>
  <rect width="222.3876" height="214.063" rx="22.2965" ry="22.2965" fill="black" mask="url(#play-mask)"/>
</svg><div id="boton-texto-watch">watch <span style="font-weight:400">some </span><span style="font-weight:700">work</span></div></div></div>
    <div id="vhs-frame">
      <div id="vhs-label"></div>
      <button id="boton-hit" class="visible" aria-label="Demo Reel"></button>
      <button id="boton-hit-cuadrado" class="visible" aria-label="Works"></button>
    </div>
    <video id="vhs" muted autoplay playsinline loop preload="auto">
      <source src="assets/videos/vhsindex.webm" type='video/webm; codecs="vp9"'>
    </video>
    <video id="vhs-reverse" muted playsinline preload="auto">
      <source src="assets/videos/vhsindex-reverse.webm" type='video/webm; codecs="vp9"'>
    </video>
    <img id="vhs-etiqueta" src="assets/images/etiquetavhs2.png" alt="">
    <video id="video-somework" muted playsinline preload="auto">
      <source src="assets/videos/tagsomework.webm?v=2" type='video/webm; codecs="vp9"'>
    </video>
<img id="logo-dtv" src="assets/images/logodtvfixed.png" alt="" style="opacity:1">
  </div>


  <div id="blend-panel">
    <div id="blend-label">blend mode</div>
    <ul id="blend-list">
      <li>contact</li>
      <li>about</li>
      <li data-theme="orange">orange<br>version</li>
      <li data-theme="red">red<br>version</li>
      <li data-theme="dark">dark<br>version</li>
      <li data-theme="white">white<br>version</li>
    </ul>
  </div>

  <script>
    const vhs   = document.getElementById("vhs");
    const stage = document.getElementById("stage");
    let btnReady = true;

    const hit          = document.getElementById("boton-hit");
    const circulo      = document.getElementById("boton-circulo");
    const circuloNegro = document.getElementById("boton-circulo-negro");
    const botonDemo    = document.getElementById("boton-demo");
    const hitCuadrado  = document.getElementById("boton-hit-cuadrado");
    const cuadrado     = document.getElementById("boton-cuadrado");
    const vhsFrame     = document.getElementById("vhs-frame");
    const videoSW      = document.getElementById("video-somework");
    videoSW.addEventListener("ended", () => { videoSW.classList.remove("active"); });

    const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    function activateHit() {
      circulo.classList.add("hovered"); circuloNegro.classList.add("hovered"); botonDemo.classList.add("hovered");
    }
    function deactivateHit() {
      circulo.classList.remove("hovered"); circuloNegro.classList.remove("hovered"); botonDemo.classList.remove("hovered");
    }
    function activateCuadrado() {
      cuadrado.classList.add("hovered"); botonDemo.classList.add("hovered");
      const pct = parseFloat(stage.style.getPropertyValue("--fondo-hover-w")) || 257.65;
      const fondoW = cuadrado.offsetWidth * pct / 100;
      const vhsFrameW = vhsFrame.offsetWidth;
      hitCuadrado.style.width = (fondoW / vhsFrameW * 100) + "%";
      hitCuadrado.style.left = (cuadrado.getBoundingClientRect().left - vhsFrame.getBoundingClientRect().left) / vhsFrameW * 100 + "%";
      hitCuadrado.style.transform = "translateY(-50%)";
      // Video somework: mostrar y reproducir desde el principio una vez
      videoSW.classList.add("active");
      videoSW.currentTime = 0;
      videoSW.playbackRate = 1.75;
      videoSW.play().catch(() => {});
    }
    function deactivateCuadrado() {
      cuadrado.classList.remove("hovered"); botonDemo.classList.remove("hovered");
      hitCuadrado.style.width = ""; hitCuadrado.style.left = ""; hitCuadrado.style.transform = "";
      // Video somework: ocultar y pausar
      videoSW.classList.remove("active");
      videoSW.pause();
    }

    if (!isTouch) {
      hit.addEventListener("mouseenter", activateHit);
      hit.addEventListener("mouseleave", deactivateHit);
      hitCuadrado.addEventListener("mouseenter", activateCuadrado);
      hitCuadrado.addEventListener("mouseleave", deactivateCuadrado);
    }

    // Calcular ancho del fondo hover
    const textoWatch = document.getElementById("boton-texto-watch");
    function setFondoWidth() {
      const cuadradoW = cuadrado.offsetWidth;
      const pct = 120 + (textoWatch.scrollWidth / cuadradoW * 100);
      stage.style.setProperty("--fondo-hover-w", pct.toFixed(2) + "%");
    }
    document.fonts.ready.then(setFondoWidth);
    window.addEventListener("resize", setFondoWidth);

    vhs.play().catch(() => {});

    function goToWorks() {
      if (!btnReady) return;
      btnReady = false;

      // Overlay de introwork sobre hom3dtv
      const introVid = document.createElement("video");
      introVid.muted = true;
      introVid.setAttribute("playsinline", "");
      const bg = document.body.classList.contains("red") ? "#FF2200"
                : document.body.classList.contains("dark") ? "#000"
                : document.body.classList.contains("orange") ? "rgb(255,170,0)"
                : "#fff";
      introVid.style.cssText = "position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:9999;background:" + bg;
      const src = document.createElement("source");
      src.src  = "assets/videos/introwork.webm";
      src.type = 'video/webm; codecs="vp9"';
      introVid.appendChild(src);
      document.body.appendChild(introVid);
      introVid.play().catch(() => {});

      // 5 frames (~167ms) después: corte de hom3dtv
      setTimeout(() => { stage.style.visibility = "hidden"; }, 167);

      introVid.addEventListener("ended", () => {
        sessionStorage.setItem("skipIntro", "1");
        window.location.href = "workka.html";
      });
    }

    if (!isTouch) {
      hit.addEventListener("click", () => {
        sessionStorage.setItem("autoplayVideo1", "1");
        goToWorks();
      });
      hitCuadrado.addEventListener("click", goToWorks);
    }

    if (isTouch) {
      let touchActive = null; // 'hit' | 'cuadrado' | null
      let touchStartY = 0;
      let didSlide    = false;

      function clearTouchHover() {
        if (touchActive === "hit")     deactivateHit();
        if (touchActive === "cuadrado") deactivateCuadrado();
        touchActive = null;
      }

      stage.addEventListener("touchstart", e => {
        touchStartY = e.touches[0].clientY;
        didSlide = false;
      }, { passive: true });

      stage.addEventListener("touchmove", e => {
        if (Math.abs(e.touches[0].clientY - touchStartY) > 15) {
          didSlide = true;
          clearTouchHover();
        }
      }, { passive: true });

      // Swipe up largo → navega
      stage.addEventListener("touchend", e => {
        const dy = touchStartY - e.changedTouches[0].clientY;
        if (dy > 50) goToWorks();
      }, { passive: true });

      hit.addEventListener("touchend", e => {
        if (didSlide) return;
        e.preventDefault();
        if (touchActive === "hit") {
          clearTouchHover();
          sessionStorage.setItem("autoplayVideo1", "1");
          goToWorks();
        } else {
          clearTouchHover();
          touchActive = "hit";
          activateHit();
        }
      }, { passive: false });

      hitCuadrado.addEventListener("touchend", e => {
        if (didSlide) return;
        e.preventDefault();
        if (touchActive === "cuadrado") {
          clearTouchHover();
          goToWorks();
        } else {
          clearTouchHover();
          touchActive = "cuadrado";
          activateCuadrado();
        }
      }, { passive: false });
    }
    // Push-back: entramos desde work.html deslizando hacia abajo
    if (document.documentElement.dataset.pushBack) {
      sessionStorage.removeItem("pushBack");
      stage.style.transform          = "translateY(-100%)";
      document.body.style.background = "#000";
      delete document.documentElement.dataset.pushBack;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        stage.style.transition = "transform 220ms cubic-bezier(0.25, 0.46, 0.45, 0.94)";
        stage.style.transform  = "translateY(0)";
        setTimeout(() => {
          stage.style.transition        = "";
          stage.style.transform         = "";
          document.body.style.background = "";
        }, 230);
      }));
    }


    // ── Panel lúdico ──────────────────────────────────────────────────────────
    document.querySelectorAll("#blend-list li").forEach(li => {
      li.addEventListener("click", () => {
        if (li.textContent.trim() === "contact") {
          window.location.href = "contact.html";
        } else if (li.dataset.theme) {
          document.body.classList.remove("dark", "orange", "red");
          if (li.dataset.theme === "dark")        { document.body.classList.add("dark");   localStorage.setItem("theme","dark"); }
          else if (li.dataset.theme === "orange") { document.body.classList.add("orange"); localStorage.setItem("theme","orange"); }
          else if (li.dataset.theme === "red")    { document.body.classList.add("red");    localStorage.setItem("theme","red"); }
          else                                    { localStorage.setItem("theme","light"); }
        } else if (li.dataset.blend) {
          document.querySelectorAll("#blend-list li").forEach(el => el.classList.remove("active"));
          li.classList.add("active");
          videoSW.style.mixBlendMode = li.dataset.blend;
        }
      });
    });



    // Restaurar estado cuando el browser vuelve desde bfcache (Chrome, Firefox)
    window.addEventListener("pageshow", (e) => {
      if (e.persisted) {
        vhs.style.transition         = "";
        vhs.style.opacity            = "";
        btnReady = true;
        vhs.play().catch(() => {});
        if (sessionStorage.getItem("pushBack") === "1") {
          sessionStorage.removeItem("pushBack");
          document.body.style.background = "#000";
          stage.style.transition = "none";
          stage.style.transform  = "translateY(-100%)";
          requestAnimationFrame(() => requestAnimationFrame(() => {
            stage.style.transition = "transform 220ms cubic-bezier(0.25, 0.46, 0.45, 0.94)";
            stage.style.transform  = "translateY(0)";
            setTimeout(() => {
              stage.style.transition        = "";
              stage.style.transform         = "";
              document.body.style.background = "";
            }, 230);
          }));
        } else {
          stage.style.transform        = "";
          document.body.style.background = "";
        }
      }
    });

    // ── VHS SCRUB ─────────────────────────────────────────────────────────────
    (function () {
      const surface  = document.getElementById("vhs-frame");
      const etiqueta = document.getElementById("vhs-etiqueta");
      const vhsRev   = document.getElementById("vhs-reverse");
      surface.style.pointerEvents  = "auto";
      etiqueta.style.pointerEvents = "auto";
      etiqueta.style.touchAction   = "none";

      let locked = false;
      let rate = 1;
      let rafId = null;
      let wantReverse = false;

      function applyRate(r) {
        const clamped = Math.max(0.1, Math.min(r, 16));
        if (wantReverse) vhsRev.playbackRate = clamped;
        else             vhs.playbackRate    = clamped;
      }

      function finishReverse() {
        const dur = vhs.duration || 10;
        vhsRev.loop = false;
        vhsRev.pause();
        vhsRev.classList.remove("active");
        vhs.currentTime = (dur - vhsRev.currentTime % dur) % dur;
        vhs.style.opacity = "";
        vhs.playbackRate = 1;
        vhs.play().catch(() => {});
        wantReverse = false;
      }

      function tick() {
        rate += (1 - rate) * 0.025;
        if (Math.abs(rate - 1) < 0.03) {
          rate = 1;
          if (wantReverse) finishReverse();
          else { vhs.playbackRate = 1; if (vhs.paused) vhs.play().catch(() => {}); }
          locked = false; rafId = null;
          return;
        }
        applyRate(rate);
        rafId = requestAnimationFrame(tick);
      }

      function trigger(peakRate) {
        if (locked) return;
        locked = true;
        if (peakRate < 0) {
          wantReverse = true;
          const dur = vhs.duration || 10;
          vhsRev.currentTime = (dur - vhs.currentTime % dur) % dur;
          vhs.pause();
          vhs.style.opacity = "0";
          vhsRev.loop = true;
          vhsRev.classList.add("active");
          rate = Math.min(Math.abs(peakRate), 16);
          vhsRev.playbackRate = rate;
          vhsRev.play().catch(() => {});
        } else {
          wantReverse = false;
          rate = peakRate;
        }
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(tick);
      }

      function calcRate(dx, dt) {
        const vel = dx / Math.max(dt, 16);
        return Math.max(-16, Math.min(vel * 80, 90));
      }

      // Mouse
      surface.addEventListener("mousedown", e => {
        if (e.target.tagName === "BUTTON" || locked) return;
        e.preventDefault();
        const x0 = e.clientX, t0 = e.timeStamp;
        window.addEventListener("mouseup", e2 => {
          const r = calcRate(e2.clientX - x0, e2.timeStamp - t0);
          if (Math.abs(r) > 0.5) trigger(r);
        }, { once: true });
      });

      // Touch — solo sobre la etiqueta del VHS
      let tx0 = 0, ty0 = 0, tt0 = 0;

      etiqueta.addEventListener("touchstart", e => {
        if (locked) return;
        tx0 = e.touches[0].clientX;
        ty0 = e.touches[0].clientY;
        tt0 = e.timeStamp;
      }, { passive: true });

      etiqueta.addEventListener("touchmove", e => {
        if (locked) return;
        const dx = Math.abs(e.touches[0].clientX - tx0);
        const dy = Math.abs(e.touches[0].clientY - ty0);
        if (dx > dy * 1.2) e.preventDefault();
      }, { passive: false });

      etiqueta.addEventListener("touchend", e => {
        if (locked) return;
        const dx = e.changedTouches[0].clientX - tx0;
        const dy = e.changedTouches[0].clientY - ty0;
        if (Math.abs(dx) < 10 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
        e.stopPropagation();
        const r = calcRate(dx, e.timeStamp - tt0);
        if (Math.abs(r) > 0.5) trigger(r);
      }, { passive: true });
    })();
  </script>

</body>
</html>
