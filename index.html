<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diego Tavella</title>
  <link rel="stylesheet" href="index.css">
  <script src="assets/lottie.min.js"></script>
  <link rel="preload" href="assets/videos/introwork.webm" as="video" type="video/webm">
</head>
<body>

  <!-- Pantalla de acceso -->
  <div id="gate">
    <div id="gate-box">
      <div id="gate-label">enter password motherfucker</div>
      <div id="gate-field">
        <input id="gate-input" type="password" placeholder="·····" autocomplete="off" />
        <button id="gate-btn">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 3l3 3-3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div id="gate-err">acceso incorrecto</div>
    </div>
  </div>

  <div id="stage">
    <div id="boton-demo"><div id="boton-circulo"></div><svg id="boton-circulo-negro" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="mask-negro">
            <rect width="100" height="100" fill="white"/>
            <text x="100" y="50" text-anchor="end" dominant-baseline="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="19.2" fill="black"><tspan font-weight="400">play</tspan><tspan font-weight="700" font-style="italic">demo</tspan></text>
          </mask>
        </defs>
        <circle cx="50" cy="50" r="49" fill="black" mask="url(#mask-negro)"/>
      </svg><div id="boton-cuadrado"><div id="boton-bolita"></div><div id="boton-video-wrap"><video id="boton-cuadrado-video" muted playsinline><source src="assets/videos/barridacabezalesmini.webm" type='video/webm; codecs="vp9"'></video><div id="boton-video-negro"></div><div id="boton-texto"><span id="bt-inner"><span id="bt-w">watch&nbsp;</span><span id="bt-s">some&nbsp;</span><span id="bt-ws">work</span></span></div></div></div></div>
    <div id="vhs-frame">
      <button id="boton-hit" aria-label="Demo Reel"></button>
      <button id="boton-hit-cuadrado" aria-label="Works"></button>
    </div>
    <video id="vhs" muted playsinline loop preload="auto">
      <source src="assets/videos/vhsindex.webm" type='video/webm; codecs="vp9"'>
    </video>
    <video id="v" muted playsinline preload="auto">
      <source src="assets/videos/logointro3.webm" type='video/webm; codecs="vp9"'>
    </video>
    <video id="vtrans" muted playsinline preload="auto" style="display:none">
      <source src="assets/videos/transicion_a_works.webm" type='video/webm; codecs="vp9"'>
    </video>
    <div id="frame"></div>
  </div>

  <script>
    const v     = document.getElementById("v");
    const vhs   = document.getElementById("vhs");
    const stage = document.getElementById("stage");
    let frozen   = false;
    let btnReady = false;

    const hit = document.getElementById("boton-hit");
    const circulo = document.getElementById("boton-circulo");
    const circuloNegro = document.getElementById("boton-circulo-negro");
    const botonDemo = document.getElementById("boton-demo");
    const hitCuadrado = document.getElementById("boton-hit-cuadrado");
    const cuadrado = document.getElementById("boton-cuadrado");
    let btnVideo, videoNegro, hoverPlays = 0, videoHovering = false;

    hit.addEventListener("mouseenter", () => { circulo.classList.add("hovered"); circuloNegro.classList.add("hovered"); botonDemo.classList.add("hovered"); });
    hit.addEventListener("mouseleave", () => { circulo.classList.remove("hovered"); circuloNegro.classList.remove("hovered"); botonDemo.classList.remove("hovered"); });

    hitCuadrado.addEventListener("mouseenter", () => {
      cuadrado.classList.add("hovered"); botonDemo.classList.add("hovered");
      if (!btnVideo || cuadrado.classList.contains("played")) return;
      videoHovering = true; hoverPlays = 0;
      videoNegro.style.opacity = "0";
      btnVideo.currentTime = 0; btnVideo.play().catch(() => {});
    });
    hitCuadrado.addEventListener("mouseleave", () => {
      cuadrado.classList.remove("hovered"); botonDemo.classList.remove("hovered");
      if (!btnVideo || cuadrado.classList.contains("played")) return;
      videoHovering = false; hoverPlays = 0;
      videoNegro.style.opacity = "0";
      if (btnVideo.paused) { btnVideo.currentTime = 0; btnVideo.play().catch(() => {}); }
    });

    function activate() {
      frozen   = true;
      btnReady = true;
      vhs.play().catch(() => {});
      v.style.transition = "opacity 300ms ease";
      v.style.opacity    = "0";
      document.getElementById("boton-hit").classList.add("visible");
      document.getElementById("boton-hit-cuadrado").classList.add("visible");
      btnVideo = document.getElementById("boton-cuadrado-video");
      videoNegro = document.getElementById("boton-video-negro");
      const squareW = cuadrado.offsetWidth;
      const textW = ["bt-w","bt-s","bt-ws"].reduce((sum, id) => {
        const el = document.getElementById(id);
        return sum + (el ? el.offsetWidth : 0);
      }, 0);
      const gap = squareW;
      cuadrado.style.setProperty("--square-w", squareW + "px");
      cuadrado.style.setProperty("--played-w", (squareW + gap + textW + gap) + "px");
      cuadrado.style.setProperty("--bt-pad", (squareW + gap) + "px");
      btnVideo.addEventListener("ended", () => {
        videoNegro.style.opacity = "1";
        cuadrado.classList.add("played");
        setTimeout(() => {
          document.getElementById("boton-texto").classList.add("visible");
        }, 50);
      }, { once: true });
      document.getElementById("boton-demo").style.opacity = "1";

      hitCuadrado.addEventListener("click", () => {
        if (!cuadrado.classList.contains("played")) return;
        cuadrado.classList.add("closing");
        setTimeout(goToWorks, 400);
      });
    }

    // Password gate
    const gate      = document.getElementById("gate");
    const gateInput = document.getElementById("gate-input");
    const gateBtn   = document.getElementById("gate-btn");
    const gateErr   = document.getElementById("gate-err");
    const PASS      = "promo";

    function tryPass() {
      if (gateInput.value === PASS) {
        gate.style.opacity = "0";
        gate.style.pointerEvents = "none";
        setTimeout(() => { gate.style.display = "none"; startVideo(); }, 400);
      } else {
        gateErr.classList.add("visible");
        gateInput.value = "";
        gateInput.focus();
      }
    }

    function startVideo() {
      if (returning) {
        v.addEventListener("loadedmetadata", () => { v.currentTime = v.duration - 0.04; });
        v.addEventListener("seeked", activate, { once: true });
      } else {
        v.addEventListener("loadedmetadata", () => {
          const stopAt = v.duration - 0.04;
          v.addEventListener("timeupdate", () => {
            if (!frozen && v.currentTime >= stopAt) { v.pause(); activate(); }
          });
        });
        v.addEventListener("ended", () => { if (!frozen) { v.pause(); activate(); } });
        v.play().catch(() => {});
      }
    }

    gateBtn.addEventListener("click", tryPass);
    gateInput.addEventListener("keydown", e => { if (e.key === "Enter") tryPass(); });

    const params    = new URLSearchParams(window.location.search);
    const returning = params.get("r") === "1";

    // Bypass: ?p o ?r=1 saltean el gate
    if (params.has("p") || returning) {
      gate.style.display = "none";
      startVideo();
    } else {
      gateInput.focus();
    }

    // Transición a works
    const vtrans = document.getElementById("vtrans");

    function goToWorks() {
      if (!btnReady) return;
      btnReady = false;

      const wipeDuration = 967;
      const feather = 200;

      [v, vhs].forEach(el => {
        el.style.maskImage = `linear-gradient(to bottom, black calc(100% - ${feather}px), transparent 100%)`;
        el.style.webkitMaskImage = `linear-gradient(to bottom, black calc(100% - ${feather}px), transparent 100%)`;
        el.style.maskSize = `100% calc(100% + ${feather}px)`;
        el.style.webkitMaskSize = `100% calc(100% + ${feather}px)`;
        el.style.maskPosition = `0 ${feather}px`;
        el.style.webkitMaskPosition = `0 ${feather}px`;
        el.style.maskRepeat = `no-repeat`;
        el.style.webkitMaskRepeat = `no-repeat`;
      });

      const wipeStart = performance.now();
      const stageH = stage.offsetHeight;
      function wipeFrame(now) {
        const t = Math.min((now - wipeStart) / wipeDuration, 1);
        const offset = feather - t * (stageH + feather);
        [v, vhs].forEach(el => {
          el.style.maskPosition = `0 ${offset}px`;
          el.style.webkitMaskPosition = `0 ${offset}px`;
        });
        if (t < 1) requestAnimationFrame(wipeFrame);
      }
      requestAnimationFrame(wipeFrame);

      sessionStorage.setItem("playTransicion", "1");
      setTimeout(() => {
        window.location.href = "works.html";
      }, 233);
    }

    document.getElementById("boton-hit").addEventListener("click", () => {
      sessionStorage.setItem("autoplayVideo1", "1");
      goToWorks();
    });

    // Swipe hacia arriba en touch
    let touchStartY = 0;
    stage.addEventListener("touchstart", (e) => {
      if (!btnReady) return;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    stage.addEventListener("touchend", (e) => {
      if (!btnReady) return;
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (dy > 50) goToWorks();
    }, { passive: true });
  </script>

</body>
</html>
