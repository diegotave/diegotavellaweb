<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diego Tavella</title>
  <link rel="stylesheet" href="index.css?v=3">
  <link rel="preload" href="assets/videos/logointro3.webm" as="video" type="video/webm">
  <link rel="preload" href="assets/videos/vhsindex.webm" as="video" type="video/webm">
  <link rel="preload" href="assets/images/etiquetavhs2.png" as="image">
  <link rel="preload" href="assets/images/logodtvfixed.png" as="image">
  <link rel="prefetch" href="hom3dtv.html">
</head>
<body>

  <!-- Pantalla de acceso -->
  <div id="gate">
    <div id="gate-box">
      <div id="gate-label">enter password motherfucker</div>
      <div id="gate-field">
        <input id="gate-input" type="password" placeholder="·····" autocomplete="off" />
        <button id="gate-btn">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M7 3l3 3-3 3" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div id="gate-err">acceso incorrecto</div>
    </div>
  </div>

  <div id="stage">
    <video id="v" muted playsinline preload="auto">
      <source src="assets/videos/logointro3.webm" type='video/webm; codecs="vp9"'>
    </video>
    <div id="frame"></div>
  </div>

  <script>
    const v   = document.getElementById("v");
    let navigated = false;

    function goHome() {
      if (navigated) return;
      navigated = true;
      window.location.href = "hom3dtv.html";
    }

    function startVideo() {
      v.addEventListener("loadedmetadata", () => {
        const stopAt = v.duration - 0.04;
        v.addEventListener("timeupdate", () => {
          if (!navigated && v.currentTime >= stopAt) goHome();
        });
      });
      v.addEventListener("ended", goHome);
      v.play().catch(() => {});
    }

    // Password gate
    const gate      = document.getElementById("gate");
    const gateInput = document.getElementById("gate-input");
    const gateBtn   = document.getElementById("gate-btn");
    const gateErr   = document.getElementById("gate-err");
    const PASS      = "promo";

    function tryPass() {
      if (gateInput.value === PASS) {
        gate.style.opacity = "0";
        gate.style.pointerEvents = "none";
        setTimeout(() => { gate.style.display = "none"; startVideo(); }, 400);
      } else {
        gateErr.classList.add("visible");
        gateInput.value = "";
        gateInput.focus();
      }
    }

    gateBtn.addEventListener("click", tryPass);
    gateInput.addEventListener("keydown", e => { if (e.key === "Enter") tryPass(); });

    const params = new URLSearchParams(window.location.search);
    if (params.has("p")) {
      gate.style.display = "none";
      startVideo();
    } else {
      gateInput.focus();
    }
  </script>

</body>
</html>
