<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diego Tavella — Postproduction</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div id="stage">

    <div id="logo-container">
      <!-- Corchetes de esquina -->
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <!-- Bloque negro del logo -->
      <div id="logo-block">
        <div id="logo-name">
          <div class="logo-line" id="line-diego">
            <span class="logo-char" data-char="D">D</span><span
                  class="logo-char" data-char="i">i</span><span
                  class="logo-char" data-char="e">e</span><span
                  class="logo-char" data-char="g">g</span><span
                  class="logo-char" data-char="o">o</span>
          </div>
          <div class="logo-line" id="line-tavella">
            <span class="logo-char" data-char="T">T</span><span
                  class="logo-char" data-char="a">a</span><span
                  class="logo-char" data-char="v">v</span><span
                  class="logo-char" data-char="e">e</span><span
                  class="logo-char" data-char="l">l</span><span
                  class="logo-char" data-char="l">l</span><span
                  class="logo-char" data-char="a">a</span>
          </div>
        </div>
      </div>

      <!-- POSTPRODUCTION fuera del bloque negro, abajo centrado -->
      <div id="logo-sub">POSTPRODUCTION</div>
    </div>

    <nav id="main-nav">
      <a href="works.html" class="nav-btn" id="btn-works">Works</a>
    </nav>

  </div>

  <script src="main.js"></script>

</body>
</html>
