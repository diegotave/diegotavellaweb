<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diego Tavella</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div id="stage">
    <video id="v" muted playsinline preload="auto">
      <source src="assets/videos/logointro3.webm" type='video/webm; codecs="vp9"'>
    </video>
    <button id="logo-btn" aria-label="Entrar a Works"></button>
  </div>

  <script>
    const v     = document.getElementById("v");
    const btn   = document.getElementById("logo-btn");
    const stage = document.getElementById("stage");
    let frozen   = false;
    let btnReady = false;

    function activate() {
      frozen   = true;
      btnReady = true;
      btn.classList.add("visible");
    }

    const returning = new URLSearchParams(window.location.search).get("r") === "1";

    if (returning) {
      // Volvemos de works — ir directo al último frame sin reproducir
      v.addEventListener("loadedmetadata", () => {
        v.currentTime = v.duration - 0.04;
      });
      v.addEventListener("seeked", activate, { once: true });
    } else {
      // Primera visita — reproducir normalmente
      v.addEventListener("loadedmetadata", () => {
        const stopAt = v.duration - 0.04;
        v.addEventListener("timeupdate", () => {
          if (!frozen && v.currentTime >= stopAt) {
            v.pause();
            activate();
          }
        });
      });

      v.addEventListener("ended", () => {
        if (!frozen) { v.pause(); activate(); }
      });

      v.play().catch(() => {});
    }

    // Hover
    btn.addEventListener("mouseenter", () => {
      if (btnReady) stage.classList.add("hovered");
    });
    btn.addEventListener("mouseleave", () => {
      stage.classList.remove("hovered");
    });

    // Click
    btn.addEventListener("click", () => {
      if (!btnReady) return;
      btnReady = false;
      stage.classList.remove("hovered");
      stage.classList.remove("pressed");
      void stage.offsetWidth;
      stage.classList.add("pressed");
      stage.addEventListener("animationend", () => {
        window.location.href = "works.html";
      }, { once: true });
    });
  </script>

</body>
</html>
