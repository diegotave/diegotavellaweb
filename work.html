    <!-- Player — dentro del stage, encima de la grilla pero debajo del frame -->

  <a id="home-btn" href="hom3dtv.html" aria-label="Home">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 2L2 7.5V14h4v-4h4v4h4V7.5L8 2Z" fill="white"/>
    </svg>

  <script>
    const R2    = "https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev";
    const v     = document.getElementById("v");
    const stage = document.getElementById("stage");

    function activate() {
      const grid  = document.getElementById("works-grid");
      const cards = Array.from(grid.querySelectorAll(".card"));
      if (cards.length % 3 !== 0) grid.classList.add("strip");
      grid.classList.add("visible");

      // Entrada escalonada izq→der, fila por fila
      cards.forEach((card, i) => {
        setTimeout(() => card.classList.add("entered"), 233 + i * 100);
      });

      const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;

      const player     = document.getElementById("player");
      const playerV    = document.getElementById("player-v");
      const playerBack = document.getElementById("player-back");
      let   playerAnim = null;

      function openPlayer(card, src) {
        const cardRect  = card.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        const cardCX = (cardRect.left + cardRect.width  / 2) - stageRect.left - 10;
        const cardCY = (cardRect.top  + cardRect.height / 2) - stageRect.top  - 10;
        const pw     = stageRect.width  - 20;
        const ph     = stageRect.height - 20;

        if (playerAnim) { playerAnim.cancel(); playerAnim = null; }

        grid.classList.remove("visible");
        document.getElementById("home-btn").style.opacity = "0";

        player.classList.add("open");
        player.style.opacity = "0";
        playerBack.style.opacity = "0";

        playerV.src = src;
        playerV.muted = false;
        playerV.play().catch(() => { playerV.muted = true; playerV.play().catch(() => {}); });

        card.classList.add("pressed");
        setTimeout(() => card.classList.remove("pressed"), 350);

        const cxPct = (cardCX / pw  * 100).toFixed(1);
        const cyPct = (cardCY / ph  * 100).toFixed(1);

        playerAnim = player.animate(
          [{ opacity: "0" }, { opacity: "1" }],
          { duration: 300, easing: "ease", fill: "forwards" }
        );
        player.animate([
          { clipPath: `circle(0% at ${cxPct}% ${cyPct}%)` },
          { clipPath: `circle(150% at 50% 50%)` }
        ], { duration: 500, easing: "cubic-bezier(0.4, 0, 0.2, 1)", fill: "forwards" });

        playerAnim.finished.then(() => {
          playerAnim.cancel();
          player.style.opacity = "1";
          player.style.clipPath = "none";
          playerAnim = null;
          playerBack.style.opacity = "1";
        }).catch(() => {});
      }

      function closePlayer() {
        if (playerAnim) { playerAnim.cancel(); playerAnim = null; }
        playerBack.style.opacity = "0";
        playerV.pause();
        playerV.src = "";

        const anim = player.animate(
          [{ opacity: "1" }, { opacity: "0" }],
          { duration: 300, easing: "ease", fill: "forwards" }
        );
        playerAnim = anim;
        anim.finished.then(() => {
          anim.cancel();
          player.classList.remove("open");
          player.style.opacity = "";
          player.style.clipPath = "";
          playerAnim = null;
          grid.classList.add("visible");
          document.getElementById("home-btn").style.opacity = "";
        }).catch(() => {});
      }

      playerBack.addEventListener("click", e => { e.stopPropagation(); closePlayer(); });
      player.addEventListener("click", e => { if (e.target === player) closePlayer(); });

      if (isTouch) {
        let touchActive = null;
        let touchStartY = 0;
        let touchStartX = 0;
        let didScroll   = false;

        function setTouchHover(card) {
          if (touchActive && touchActive !== card) touchActive.classList.remove("touch-hover");
          touchActive = card;
          card.classList.add("touch-hover");
        }
        function clearTouchHover() {
          if (touchActive) { touchActive.classList.remove("touch-hover"); touchActive = null; }
        }

        grid.addEventListener("touchstart", e => {
          touchStartY = e.touches[0].clientY;
          touchStartX = e.touches[0].clientX;
          didScroll = false;
        }, { passive: true });

        grid.addEventListener("touchmove", e => {
          const dy = Math.abs(e.touches[0].clientY - touchStartY);
          const dx = Math.abs(e.touches[0].clientX - touchStartX);
          if (dy > 8 || dx > 8) {
            didScroll = true;
            clearTouchHover();
          }
        }, { passive: true });

        grid.addEventListener("scroll", clearTouchHover, { passive: true });

        cards.forEach(card => {
          card.addEventListener("touchend", e => {
            if (didScroll) return;
            e.preventDefault();
            if (touchActive === card) {
              const src = card.dataset.video;
              if (src) { clearTouchHover(); openPlayer(card, R2 + "/" + src); }
            } else {
              setTouchHover(card);
            }
          }, { passive: false });
        });

      } else {
        cards.forEach(card => {
          card.addEventListener("click", () => {
            const src = card.dataset.video;
            if (src) openPlayer(card, R2 + "/" + src);
          });
        });
      }

      if (sessionStorage.getItem("autoplayVideo1") === "1") {
        sessionStorage.removeItem("autoplayVideo1");
        const card1 = cards[0];
        if (card1 && card1.dataset.video) openPlayer(card1, R2 + "/" + card1.dataset.video);
      }
    }

    let cardsTriggered = false;
    let vhsTriggered   = false;
    const vhsBotonera  = document.getElementById("vhs-botonera");

    v.addEventListener("loadedmetadata", () => {
      const triggerAt    = Math.max(v.duration - 1.0, 0);
      const vhsTriggerAt = Math.max(v.duration - (10 / 30), 0);
      v.addEventListener("timeupdate", () => {
        if (!vhsTriggered && v.currentTime >= vhsTriggerAt) {
          vhsTriggered = true;
          vhsBotonera.play().catch(() => {});
        }
        if (!cardsTriggered && v.currentTime >= triggerAt) {
          cardsTriggered = true;
          activate();
        }
      });
    });

    v.addEventListener("ended", () => {
      if (!cardsTriggered) activate();
      v.style.display = "none";
    });

    setTimeout(() => { v.play().catch(() => {}); }, 333);

    // Swipe hacia abajo para volver a hom3dtv
    let swipeStartY = 0;
    stage.addEventListener("touchstart", e => {
      swipeStartY = e.touches[0].clientY;
    }, { passive: true });
    stage.addEventListener("touchend", e => {
      const grid = document.getElementById("works-grid");
      if (grid && grid.scrollTop > 5) return; // solo si el scroll está arriba del todo
      const dy = e.changedTouches[0].clientY - swipeStartY;
      if (dy > 80) goBack();
    }, { passive: true });

    function goBack() {
      sessionStorage.setItem("pushBack", "1");
      document.body.style.background = "#000";
      stage.style.transition = "transform 200ms ease-in";
      stage.style.transform  = "translateY(100%)";
      setTimeout(() => { window.location.href = "hom3dtv.html"; }, 190);
    }

    // Push-in desde abajo: el stage ya está en translateY(100%) vía CSS (data-push-in).
    // Bloqueamos esa posición inline, eliminamos el atributo, luego animamos.
    if (document.documentElement.dataset.pushIn) {
      sessionStorage.removeItem("pushIn");
      stage.style.transform          = "translateY(100%)"; // bloquea posición inline
      document.body.style.background = "#000";             // mantiene negro mientras anima
      delete document.documentElement.dataset.pushIn;      // libera regla CSS (body sigue negro por inline)
      requestAnimationFrame(() => requestAnimationFrame(() => {
        stage.style.transition = "transform 220ms cubic-bezier(0.25, 0.46, 0.45, 0.94)";
        stage.style.transform  = "";
        setTimeout(() => {
          stage.style.transition        = "";
          document.body.style.background = ""; // restaura al terminar — el stage ya cubre todo
        }, 230);
      }));
    }
  </script>
