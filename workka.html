<body class="orange"><script>(function(){var t=localStorage.getItem("theme")||"orange";document.body.className=t==="light"?"light":t==="dark"?"":t==="red"?"red":"orange";})()</script><script>(function(){function s(){var p=screen.orientation?screen.orientation.type.startsWith("portrait"):window.innerHeight>=window.innerWidth;document.body.classList.toggle("is-portrait",p)}s();window.addEventListener("resize",s);if(screen.orientation)screen.orientation.addEventListener("change",s)})()</script>

  <div id="stage">

    <video id="v" muted playsinline preload="auto">
      <source src="assets/videos/introwork.webm" type='video/webm; codecs="vp9"'>
    </video>

    <!-- Home button (posicionado por JS alineado con primer spine) -->
    <div id="home-btn">
      <div id="home-fondo"></div>
      <svg id="home-icon" viewBox="0 0 222.3876 214.063" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="home-mask">
            <rect width="222.3876" height="214.063" fill="white"/>
            <path id="home-mask-path" fill="black" transform="translate(154.63,48.26) scale(-0.72,0.72)" d="M17.3353,2.0513l98.7013,70.2095c6.1132,4.3485,6.1583,13.4121.0887,17.8213L18.2873,161.1548c-7.2294,5.2517-17.3692.1237-17.4238-8.8117L.0002,11.0609C-.0544,2.1141,10.0447-3.1347,17.3353,2.0513Z"/>
          </mask>
        </defs>
        <rect width="222.3876" height="214.063" rx="22.2965" ry="22.2965" fill="black" mask="url(#home-mask)"/>
      </svg>
      <div id="home-texto">home</div>
    </div>
    <button id="home-hit" aria-label="Volver a inicio"></button>

    <!-- Videoteca -->
    <div id="shelf-wrap" style="visibility:hidden">
      <div id="shelf-rail"></div>
    </div>

    <!-- Player -->
    <div id="player">
      <video id="player-v" playsinline></video>
      <button id="player-back" aria-label="Volver">
        <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L4 8l6 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div id="vhs-ruler">
      <span id="ruler-left"><span class="ruler-dashes"></span><span class="ruler-title"></span><span class="ruler-arrow"> &gt;</span></span>
      <span id="ruler-gap"></span>
      <span id="ruler-right"><span class="ruler-arrow"> &lt;</span><span class="ruler-title"></span><span class="ruler-dashes"></span></span>
    </div>

  </div>
  <div id="frame" style="position:fixed;inset:10px;pointer-events:none"></div>

  <div id="blend-panel">
    <div id="blend-label">blend mode</div>
    <ul id="blend-list">
      <li id="nav-alt4">home alternativo</li>
      <li>contact</li>
      <li data-theme="orange">orange<br>version</li>
      <li data-theme="red">red<br>version</li>
      <li data-theme="dark">dark<br>version</li>
      <li data-theme="light">white<br>version</li>
    </ul>
  </div>





  <script>
    const R2 = "https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev";

    const works = [
      { title: "Demo Reel",            thumb: R2+"/WORKS/video1/thumbv1.png",  video: R2+"/WORKS/video1/video1reel.mp4",    ratio:"16/9", startAt: 1 },
      { title: "Multideportes · ESPN", thumb: R2+"/WORKS/video2/THUMBV2.png",  video: R2+"/WORKS/video2/Multideportes.mp4", ratio:"16/9" },
      { title: "Autocine Tenaris",      thumb: "",                               video: R2+"/WORKS/video6ok/AUTOCINE%20TENARIS%20ALTA.mp4", ratio:"16/9" },
      { title: "El Escuerzo",          thumb: R2+"/WORKS/video4/thumbv4.png",  video: R2+"/WORKS/video4/video4.mp4",         ratio:"16/9", png:"assets/images/vhslomo10.webp" },
      { title: "Video 05",             thumb: "",                               video: R2+"/WORKS/video5/efda.mp4", ratio:"16/9" },
      { title: "FOX CHANNEL - HIGHLIGHT FEBRERO", thumb: "",                   video: R2+"/WORKS/videofav/FOX%20HIGHLIGHT%20FEBRERO%2060%20SEGS_PT%20(2).mp4", ratio:"16/9" },
      { title: "Highlight Fox",        thumb: R2+"/WORKS/video6/THUMBV6.png",  video: R2+"/WORKS/video6/hltfoxviejo.mp4",   ratio:"16/9" },
      { title: "Video 08",             thumb: "",                               video: "",                                    ratio:"16/9" },
      { title: "Visita",               thumb: R2+"/WORKS/video9/thumbv9.png",  video: R2+"/WORKS/video9/video9.mp4",         ratio:"1/1"  },
    ];

    const stage = document.getElementById("stage");

    const VHS_PNG = "assets/images/vhslomo10.webp"; // overlay del lomo VHS

    // precargar el PNG para que todos los lomos lo reciban ya cacheado
    const _preload = new Image(); _preload.src = VHS_PNG;

    // ── BUILD ─────────────────────────────────────────────────────────────────
    (function buildShelf() {
      const rail = document.getElementById("shelf-rail");
      works.forEach((work, i) => {
        const spine = document.createElement("div");
        spine.className = "vhs-spine";
        spine.dataset.index = i;

        // contenedor visual (escala en hover)
        const visual = document.createElement("div");
        visual.className = "vhs-visual";

        // cover art detrás
        const cover = document.createElement("img");
        cover.className = "vhs-cover";
        cover.src = work.thumb || "";
        cover.alt = "";
        cover.loading = "lazy";
        visual.appendChild(cover);

        // overlay PNG del lomo VHS (encima)
        const png = document.createElement("img");
        png.className = "vhs-png";
        png.src = work.png || VHS_PNG;
        png.alt = "";
        visual.appendChild(png);

        // label vertical
        const label = document.createElement("span");
        label.className = "vhs-label";
        label.textContent = work.title;
        visual.appendChild(label);

        spine.appendChild(visual);

        rail.appendChild(spine);
      });
    })();

    function activateShelf() {
      document.getElementById("shelf-wrap").style.visibility = "";
      const spines = document.querySelectorAll(".vhs-spine");
      spines.forEach((spine, i) => {
        setTimeout(() => spine.classList.add("entered"), 80 + i * 60);
      });
      requestAnimationFrame(positionHomeBtn); // sync left with first spine after layout
    }

    // ── CALIBRATE ─────────────────────────────────────────────────────────────
    // Pre-size the rail so each .vhs-visual naturally matches the frame height.
    // Elevation then only needs translateY — no scale change.
    function calibrateBlock() {
      const frameR   = document.getElementById("frame").getBoundingClientRect();
      const margin   = 12; // px gap top and bottom inside frame
      const targetH  = frameR.height - margin * 2;
      // .vhs-visual height is 85% of rail height (CSS: height: 85%)
      const railH    = targetH / 0.85;
      rail.style.height = railH + "px";
      positionHomeBtn();
    }

    // Run after first paint so getBoundingClientRect is valid
    requestAnimationFrame(() => requestAnimationFrame(calibrateBlock));

    // ── HOVER ─────────────────────────────────────────────────────────────────
    let activeIndex   = -1;
    let elevatedIdx   = -1;   // índice del .vhs-visual elevado
    let elevatedDY    = 0;    // translateY aplicado al .vhs-visual elevado
    let elevatedScale = 1;    // scale aplicado al .vhs-visual elevado

    function getVisual(idx) {
      return rail.querySelectorAll(".vhs-spine")[idx]?.querySelector(".vhs-visual") ?? null;
    }

    function elevatedTransform(extraRotate) {
      const t = `translateY(${elevatedDY.toFixed(1)}px) scale(${elevatedScale.toFixed(4)})`;
      return extraRotate ? `${t} rotateZ(${extraRotate.toFixed(1)}deg)` : t;
    }

    function elevateVisual(idx) {
      const stageR    = stage.getBoundingClientRect();
      const frameR    = document.getElementById("frame").getBoundingClientRect();
      const spines    = Array.from(rail.querySelectorAll(".vhs-spine"));
      const isPortrait = document.body.classList.contains("is-portrait");

      // Bajar el visual anterior
      if (elevatedIdx >= 0 && elevatedIdx !== idx) {
        const prev = getVisual(elevatedIdx);
        if (prev) prev.style.transform = "";
      }

      // Inactivos: se van para abajo
      spines.forEach((spine, i) => {
        spine.style.transform = (i !== idx) ? `translateY(${stageR.height}px)` : "";
      });

      elevatedIdx   = idx;
      elevatedDY    = 0;
      elevatedScale = 1;
      setActive(idx);

      if (isPortrait) {
        // Portrait: expandir solo el spine activo (cada spine es su propio contenedor)
        spines[idx].style.width = "75vw";
        const sp = spines[idx];
        if (sp._leaveHandler) sp.removeEventListener("mouseleave", sp._leaveHandler);
        sp._leaveHandler = () => { dropElevated(); setActive(-1); };
        sp.addEventListener("mouseleave", sp._leaveHandler);
        return;
      }

      // Landscape: translateY al centro del frame
      const v = getVisual(idx);
      if (!v) return;
      const vR = v.getBoundingClientRect();

      let dy = (frameR.top + frameR.height / 2) - (vR.top + vR.height / 2);
      if (vR.top    + dy < frameR.top)    dy += frameR.top    - (vR.top    + dy);
      if (vR.bottom + dy > frameR.bottom) dy -= (vR.bottom + dy) - frameR.bottom;

      elevatedDY    = dy;
      v.style.transition = "transform 800ms cubic-bezier(0.34, 1.56, 0.64, 1)";
      v.style.transform  = `translateY(${dy.toFixed(1)}px)`;

      if (v._leaveHandler) v.removeEventListener("mouseleave", v._leaveHandler);
      v._leaveHandler = () => { dropElevated(); setActive(-1); };
      v.addEventListener("mouseleave", v._leaveHandler);

      showRuler(idx);
    }

    // ── RULER ─────────────────────────────────────────────────────────────────
    function showRuler(idx) {
      const ruler   = document.getElementById("vhs-ruler");
      const spine   = rail.querySelectorAll(".vhs-spine")[idx];
      const visual  = spine.querySelector(".vhs-visual");
      const visualR = visual.getBoundingClientRect();
      const spines  = Array.from(rail.querySelectorAll(".vhs-spine"));
      const firstR  = spines[0].getBoundingClientRect();
      const lastR   = spines[spines.length - 1].getBoundingClientRect();
      const railR   = rail.getBoundingClientRect();
      const frameR  = document.getElementById("frame").getBoundingClientRect();
      const stageR  = stage.getBoundingClientRect();

      // Ruler spans from first spine left to last spine right
      const rulerLeft0  = firstR.left;
      const rulerRight0 = lastR.right;

      const leftW  = visualR.left - rulerLeft0;    // fill-l width
      const gapW   = visualR.width;                // gap = visual width
      const rightW = rulerRight0 - visualR.right;  // fill-r width

      const titleOnRight = rightW >= leftW;
      const DASHES = "-  ".repeat(60);
      const title  = works[idx].title;

      const rulerLeft  = document.getElementById("ruler-left");
      const rulerRight = document.getElementById("ruler-right");
      const rulerGap   = document.getElementById("ruler-gap");

      const halfExtra = gapW * 0.1;
      const lFill = Math.max(0, leftW  - halfExtra);
      const rFill = Math.max(0, rightW - halfExtra);
      const gap   = gapW + (leftW - lFill) + (rightW - rFill);
      rulerLeft.style.width  = lFill + "px";
      rulerGap.style.width   = gap   + "px";
      rulerRight.style.width = rFill + "px";

      // Dashes fill — título del lado con más espacio, pegado a la flecha
      const dashesL = rulerLeft.querySelector(".ruler-dashes");
      const titleL  = rulerLeft.querySelector(".ruler-title");
      const dashesR = rulerRight.querySelector(".ruler-dashes");
      const titleR  = rulerRight.querySelector(".ruler-title");

      if (titleOnRight) {
        dashesL.style.direction = "ltr";
        dashesL.textContent = DASHES;
        titleL.textContent  = "";
        titleR.textContent  = "-" + title + "-";
        dashesR.textContent = DASHES;
      } else {
        // rtl en dashes: el texto empieza por la derecha (pegado a >)
        dashesL.style.direction = "rtl";
        dashesL.textContent = DASHES;
        titleL.textContent  = "-" + title + "-";
        titleR.textContent  = "";
        dashesR.textContent = DASHES;
      }

      ruler.classList.add("visible");

      // Position: de primer spine a último spine
      ruler.style.left  = (rulerLeft0 - stageR.left) + "px";
      ruler.style.width = (rulerRight0 - rulerLeft0)  + "px";
      ruler.style.top   = (railR.top - stageR.top + railR.height * 0.075 - 50) + "px";
    }

    function hideRuler() {
      document.getElementById("vhs-ruler").classList.remove("visible");
    }

    function dropElevated() {
      if (elevatedIdx < 0) return;
      const v = getVisual(elevatedIdx);
      if (v) {
        if (v._leaveHandler) { v.removeEventListener("mouseleave", v._leaveHandler); delete v._leaveHandler; }
        v.style.transition = "transform 280ms cubic-bezier(0.55, 0, 1, 0.45)"; // cae pesado
        v.style.transform  = "";
        v.addEventListener("transitionend", () => { v.style.transition = ""; }, { once: true });
      }
      // Volver todos los spines a su lugar
      rail.querySelectorAll(".vhs-spine").forEach(spine => spine.style.transform = "");
      // Resetear spine activo y limpiar handlers en portrait
      const spinesAll = Array.from(rail.querySelectorAll(".vhs-spine"));
      spinesAll.forEach(sp => {
        sp.style.width = "";
        if (sp._leaveHandler) { sp.removeEventListener("mouseleave", sp._leaveHandler); delete sp._leaveHandler; }
      });
      elevatedIdx   = -1;
      elevatedDY    = 0;
      elevatedScale = 1;
      hideRuler();
    }

    function setActive(idx) {
      if (activeIndex === idx) return;
      activeIndex = idx;

      const rail   = document.getElementById("shelf-rail");
      const spines = Array.from(rail.querySelectorAll(".vhs-spine"));

      spines.forEach((spine, i) => {
        spine.classList.toggle("is-active", idx >= 0 && i === idx);
      });
    }

    // ── TILT ──────────────────────────────────────────────────────────────────
    // ── TILT (velocity-based) ─────────────────────────────────────────────────
    let prevMouseX    = null;
    let smoothDx      = 0;
    let tiltTimer     = null;

    function updateTilt(mouseX, opts) {
      const ZONE        = opts?.zone        ?? 20;
      const MAX_ANGLE   = opts?.maxAngle    ?? 3;
      const SENSITIVITY = opts?.sensitivity ?? 0.35;
      const IDLE_MS     = opts?.idleMs      ?? 110;
      const onIdle      = opts?.onIdle      ?? clearTilt;
      const noPush      = opts?.noPush      ?? false;
      const pushScale   = opts?.pushScale   ?? 1;
      const emaK        = opts?.ema         ?? 0.55;

      const spines = Array.from(rail.querySelectorAll(".vhs-spine"));
      const idx    = activeIndex;

      if (idx < 0) { prevMouseX = null; smoothDx = 0; return; }

      // zona del lomo activo
      const rect   = spines[idx].getBoundingClientRect();
      const inZone = mouseX >= rect.left - ZONE && mouseX <= rect.right + ZONE;
      if (!inZone) { prevMouseX = null; smoothDx = 0; onIdle(); return; }

      // velocidad suavizada (EMA) → evita jitter
      const rawDx = prevMouseX !== null ? mouseX - prevMouseX : 0;
      prevMouseX  = mouseX;
      smoothDx    = smoothDx * emaK + rawDx * (1 - emaK);

      const angle  = Math.max(-MAX_ANGLE, Math.min(MAX_ANGLE, smoothDx * SENSITIVITY));

      // desplazamiento geométrico real: vértice superior del .vhs-visual recorre H×sin(θ)
      const visual  = spines[idx].querySelector(".vhs-visual");
      const vHeight = visual ? visual.offsetHeight : spines[idx].offsetHeight * 0.85;
      const pushPx  = vHeight * Math.sin(Math.abs(angle) * Math.PI / 180);

      spines.forEach((spine, i) => {
        const v = spine.querySelector(".vhs-visual");
        if (!v) return;
        const isElev = (elevatedIdx === i);
        if (i === idx) {
          v.style.transform = isElev
            ? elevatedTransform(0)
            : `rotateZ(${angle.toFixed(1)}deg)`;
          spine.style.transform = "";
        } else {
          v.style.transform = isElev ? elevatedTransform(0) : "";
          if (!noPush) {
            const px = (pushPx * pushScale).toFixed(1);
            if      (angle >  0.1 && i > idx) spine.style.transform = `translateX(${px}px)`;
            else if (angle < -0.1 && i < idx) spine.style.transform = `translateX(-${px}px)`;
            else                              spine.style.transform = "";
          } else {
            spine.style.transform = "";
          }
        }
      });

      clearTimeout(tiltTimer);
      tiltTimer = setTimeout(onIdle, IDLE_MS);
    }

    function clearTilt() {
      prevMouseX = null;
      smoothDx   = 0;
      Array.from(rail.querySelectorAll(".vhs-spine")).forEach((spine, i) => {
        const v = spine.querySelector(".vhs-visual");
        if (v) v.style.transform = (elevatedIdx === i) ? elevatedTransform(0) : "";
        spine.style.transform = "";
      });
    }

    // ── EVENTS ────────────────────────────────────────────────────────────────
    const rail    = document.getElementById("shelf-rail");
    const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;

    // ── HOME BUTTON ───────────────────────────────────────────────────────────
    const homeBtn    = document.getElementById("home-btn");
    const homeHit    = document.getElementById("home-hit");
    const homeFondo  = document.getElementById("home-fondo");
    const homeTexto  = document.getElementById("home-texto");
    let homeBtnOrigW = 0;
    let homeTouchActive = false;

    function setHomeHoverW() {
      if (!homeBtnOrigW) return;
      const pct = 120 + (homeTexto.scrollWidth / homeBtnOrigW * 100);
      homeBtn.style.setProperty("--home-hover-w", pct.toFixed(2) + "%");
    }

    function positionHomeBtn() {
      const dvh        = Math.min(window.innerHeight, 1080);
      const btnSize    = (dvh - 20) * 0.04813;
      homeBtnOrigW     = btnSize;
      const isPortrait = document.body.classList.contains("is-portrait");

      homeBtn.style.width  = btnSize + "px";
      homeBtn.style.height = btnSize + "px";
      homeBtn.style.setProperty("--home-btn-size", btnSize + "px");
      homeHit.style.width  = btnSize + "px";
      homeHit.style.height = btnSize + "px";

      if (isPortrait) {
        // Right side aligned with first spine top, same margin as blend-panel
        homeBtn.style.top   = "60px";
        homeBtn.style.right = "16px";
        homeBtn.style.left  = "";
        homeHit.style.top   = "60px";
        homeHit.style.right = "16px";
        homeHit.style.left  = "";
      } else {
        const topPx = dvh * 0.06;
        homeBtn.style.top   = topPx + "px";
        homeBtn.style.right = "";
        homeHit.style.top   = topPx + "px";
        homeHit.style.right = "";
        // Align left edge with first VHS spine
        const spines = rail.querySelectorAll(".vhs-spine");
        if (spines.length) {
          const stageR = stage.getBoundingClientRect();
          const spineR = spines[0].getBoundingClientRect();
          const leftPx = spineR.left - stageR.left;
          homeBtn.style.left = leftPx + "px";
          homeHit.style.left = leftPx + "px";
        }
      }
      setHomeHoverW();
    }

    function activateHomeBtn() {
      homeBtn.classList.add("hovered");
      const hoverPct = parseFloat(homeBtn.style.getPropertyValue("--home-hover-w")) || 300;
      homeHit.style.width = (homeBtnOrigW * hoverPct / 100) + "px";
    }

    function deactivateHomeBtn() {
      homeBtn.classList.remove("hovered");
      homeHit.style.width = homeBtnOrigW + "px";
      homeTouchActive = false;
    }

    function goHome() {
      sessionStorage.setItem("pushBack", "1");
      window.location.href = "hom3dtv.html";
    }

    document.fonts.ready.then(setHomeHoverW);

    // Portrait: tap fuera del shelf cierra el estado elevado
    stage.addEventListener("touchend", e => {
      if (elevatedIdx < 0) return;
      if (!document.body.classList.contains("is-portrait")) return;
      if (!e.target.closest(".vhs-spine")) { dropElevated(); setActive(-1); }
    }, { passive: true });

    if (isTouch) {
      let spineCenters = [];

      const TOUCH_OPTS = { zone: 60, maxAngle: 3, sensitivity: 0.6, idleMs: 110, pushScale: 0.35, ema: 0.78 };

      function touchClearTilt() {
        const spines = Array.from(rail.querySelectorAll(".vhs-spine"));
        spines.forEach(spine => {
          const v = spine.querySelector(".vhs-visual");
          if (v) v.style.transition = "transform 620ms cubic-bezier(0.25, 1.4, 0.5, 1)";
          spine.style.transition    = "transform 620ms cubic-bezier(0.25, 1.4, 0.5, 1)";
        });
        clearTilt();
        prevMouseX = null; smoothDx = 0;
        setTimeout(() => spines.forEach(sp => {
          const v = sp.querySelector(".vhs-visual");
          if (v) v.style.transition = "";
          sp.style.transition = "";
        }), 640);
      }

      TOUCH_OPTS.onIdle = touchClearTilt;

      rail.addEventListener("touchstart", e => {
        const spine = e.target.closest(".vhs-spine");
        if (!spine) return;
        setActive(+spine.dataset.index);
        prevMouseX = null; smoothDx = 0;
        spineCenters = Array.from(rail.querySelectorAll(".vhs-spine")).map(sp => {
          const r = sp.getBoundingClientRect();
          return (r.left + r.right) / 2;
        });
      }, { passive: true });

      rail.addEventListener("touchmove", e => {
        if (e.touches.length !== 1 || elevatedIdx >= 0) return;
        const touchX = e.touches[0].clientX;
        if (!spineCenters.length) return;

        let hoverIdx = 0, minD = Infinity;
        spineCenters.forEach((cx, i) => {
          const d = Math.abs(touchX - cx);
          if (d < minD) { minD = d; hoverIdx = i; }
        });
        if (hoverIdx !== activeIndex) setActive(hoverIdx);

        updateTilt(touchX, TOUCH_OPTS);
      }, { passive: true });

      rail.addEventListener("touchend",    touchClearTilt, { passive: true });
      rail.addEventListener("touchcancel", touchClearTilt, { passive: true });

      rail.addEventListener("click", e => {
        const spine = e.target.closest(".vhs-spine");
        if (!spine) return;
        const idx  = +spine.dataset.index;
        const work = works[idx];

        if (document.body.classList.contains("is-portrait")) {
          if (elevatedIdx === idx) {
            if (!work.video) return;
            dropElevated();
            setActive(-1);
            spine.style.transition = "transform 340ms cubic-bezier(0.4, 0, 1, 1)";
            spine.style.transform  = "translateX(110%)";
            setTimeout(() => {
              spine.style.transition = "";
              spine.style.transform  = "";
              openPlayer(spine, work.video, work.startAt, work.ratio);
            }, 300);
          } else {
            dropElevated();
            elevateVisual(idx);
          }
        } else {
          if (elevatedIdx === idx) {
            if (work.video) openPlayer(spine, work.video, work.startAt, work.ratio);
          } else {
            elevateVisual(idx);
          }
        }
      });
    } else {
      let rafId = null;
      rail.addEventListener("mousemove", e => {
        const spine = e.target.closest(".vhs-spine");
        const idx   = spine ? +spine.dataset.index : -1;
        const mx    = e.clientX;
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(() => {
          setActive(idx);
          updateTilt(mx);
          rafId = null;
        });
      });
      rail.addEventListener("mouseleave", () => {
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        setActive(-1);
        clearTilt();
      });
      rail.addEventListener("click", e => {
        const spine = e.target.closest(".vhs-spine");
        if (!spine) return;
        const idx  = +spine.dataset.index;
        const work = works[idx];
        if (elevatedIdx === idx) {
          if (work.video) openPlayer(spine, work.video, work.startAt, work.ratio);
        } else {
          elevateVisual(idx);
        }
      });
    }

    // ── HOME HIT EVENTS ──────────────────────────────────────────────────────
    if (!isTouch) {
      homeHit.addEventListener("mouseenter", activateHomeBtn);
      homeHit.addEventListener("mouseleave", deactivateHomeBtn);
      homeHit.addEventListener("click", goHome);
    } else {
      homeHit.addEventListener("touchend", e => {
        e.preventDefault();
        if (homeTouchActive) {
          deactivateHomeBtn();
          goHome();
        } else {
          homeTouchActive = true;
          activateHomeBtn();
        }
      }, { passive: false });
    }

    // ── PLAYER ────────────────────────────────────────────────────────────────
    const player     = document.getElementById("player");
    const playerV    = document.getElementById("player-v");
    const playerBack = document.getElementById("player-back");
    let   playerAnim = null;



    function openPlayer(spineEl, src, startAt, ratio) {
      const stageRect = stage.getBoundingClientRect();
      const rect      = spineEl.getBoundingClientRect();
      const cx  = (rect.left + rect.width  / 2) - stageRect.left - 10;
      const cy  = (rect.top  + rect.height / 2) - stageRect.top  - 10;
      const pw  = stageRect.width  - 20;
      const ph  = stageRect.height - 20;

      if (playerAnim) { playerAnim.cancel(); playerAnim = null; }

      document.getElementById("shelf-wrap").style.visibility = "hidden";
      homeBtn.style.opacity = "0";
      homeHit.style.opacity = "0";
      homeHit.style.pointerEvents = "none";

      player.classList.add("open");
      player.style.opacity = "0";
      playerBack.style.opacity = "0";

      playerV.classList.toggle("square", ratio === "1/1");
      playerV.src = src;
      if (startAt) playerV.addEventListener("loadedmetadata", () => { playerV.currentTime = startAt; }, { once: true });
      playerV.muted = false;
      playerV.play().catch(() => { playerV.muted = true; playerV.play().catch(() => {}); });

      const cxPct = (cx / pw * 100).toFixed(1);
      const cyPct = (cy / ph * 100).toFixed(1);

      playerAnim = player.animate(
        [{ opacity: "0" }, { opacity: "1" }],
        { duration: 300, easing: "ease", fill: "forwards" }
      );
      player.animate([
        { clipPath: `circle(0% at ${cxPct}% ${cyPct}%)` },
        { clipPath: `circle(150% at 50% 50%)` }
      ], { duration: 500, easing: "cubic-bezier(0.4, 0, 0.2, 1)", fill: "forwards" });

      playerAnim.finished.then(() => {
        playerAnim.cancel();
        player.style.opacity = "1";
        player.style.clipPath = "none";
        playerAnim = null;
        playerBack.style.opacity = "1";
      }).catch(() => {});
    }

    function closePlayer() {
      if (playerAnim) { playerAnim.cancel(); playerAnim = null; }
      playerBack.style.opacity = "0";
      playerV.pause();
      playerV.src = "";

      const anim = player.animate(
        [{ opacity: "1" }, { opacity: "0" }],
        { duration: 300, easing: "ease", fill: "forwards" }
      );
      playerAnim = anim;
      anim.finished.then(() => {
        anim.cancel();
        player.classList.remove("open");
        player.style.opacity = "";
        player.style.clipPath = "";
        playerAnim = null;
        document.getElementById("shelf-wrap").style.visibility = "";
        homeBtn.style.opacity = "";
        homeHit.style.opacity = "";
        homeHit.style.pointerEvents = "";
        dropElevated();
      }).catch(() => {});
    }

    playerBack.addEventListener("click", e => { e.stopPropagation(); closePlayer(); });
    player.addEventListener("click",     e => { if (e.target === player) closePlayer(); });


    // ── THEME TOGGLE ──────────────────────────────────────────────────────────

    // ── RESIZE: recalibrar bloque y recalcular elevación ─────────────────────
    window.addEventListener("resize", () => {
      calibrateBlock();
      if (elevatedIdx >= 0) elevateVisual(elevatedIdx);
    });

    // ── INTRO VIDEO ───────────────────────────────────────────────────────────
    const v = document.getElementById("v");
    let shelfTriggered = false;

    sessionStorage.removeItem("entryMode");

    v.addEventListener("loadedmetadata", () => {
      const triggerAt = Math.max(v.duration - 1.0, 0);
      v.addEventListener("timeupdate", () => {
        if (!shelfTriggered && v.currentTime >= triggerAt) {
          shelfTriggered = true;
          activateShelf();
        }
      });
    });

    v.addEventListener("ended", () => {
      if (!shelfTriggered) activateShelf();
      v.style.display = "none";
    });

    setTimeout(() => { v.play().catch(() => {}); }, 333);

    // ── AUTOPLAY DEMO 1 (viene de play demo en hom3dtv) ──────────────────────
    if (sessionStorage.getItem("autoplayVideo1") === "1") {
      sessionStorage.removeItem("autoplayVideo1");
      v.style.display = "none";
      shelfTriggered  = true;
      // Preparar spines con entered (quedan ocultos bajo visibility:hidden del shelf-wrap)
      document.querySelectorAll(".vhs-spine").forEach((spine, i) => {
        setTimeout(() => spine.classList.add("entered"), 80 + i * 60);
      });
      playerV.addEventListener("loadedmetadata", () => {
        playerV.currentTime = 1;
      }, { once: true });
      setTimeout(() => {
        const spines = document.querySelectorAll(".vhs-spine");
        if (spines[0] && works[0].video) openPlayer(spines[0], works[0].video);
      }, 400);
    }

    // ── VIENE DE hom3dtv (introwork ya reprodujo allá) ───────────────────────
    if (sessionStorage.getItem("skipIntro") === "1") {
      sessionStorage.removeItem("skipIntro");
      v.style.display = "none";
      shelfTriggered  = true;
      activateShelf();
    }

    document.getElementById("nav-alt4").addEventListener("click", () => {
      window.location.href = "hom4dtv.html";
    });

    // ── PANEL DE TEMAS ────────────────────────────────────────────────────────
    document.querySelectorAll("#blend-list li").forEach(li => {
      li.addEventListener("click", () => {
        if (li.textContent.trim() === "contact") {
          window.location.href = "contact.html";
        } else if (li.dataset.theme) {
          document.body.classList.remove("dark", "orange", "red", "light");
          if (li.dataset.theme === "orange")      { document.body.classList.add("orange"); localStorage.setItem("theme","orange"); }
          else if (li.dataset.theme === "red")    { document.body.classList.add("red");    localStorage.setItem("theme","red"); }
          else if (li.dataset.theme === "light")  { document.body.classList.add("light");  localStorage.setItem("theme","light"); }
          else                                    { localStorage.setItem("theme","dark"); }
        }
      });
    });
  </script>

</body>
</html>
