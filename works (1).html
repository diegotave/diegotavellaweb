  <!-- El contenido de works se monta acá después del freeze -->
  <div id="works-content" hidden></div>

  <script>
    const R2    = "https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev";
    const v     = document.getElementById("v");
    const vloop = document.getElementById("vloop");
    const stage = document.getElementById("stage");
    let frozen = false;

    function activate() {
      frozen = true;
      stage.classList.add("frozen");
      vloop.play().catch(() => {});
      v.style.opacity = "0";

      // Mostrar botonera con fade
      const grid = document.getElementById("works-grid");
      grid.classList.add("visible");

      // Interacción de las cards
      const cards = Array.from(grid.querySelectorAll(".card"));
      function getPos(i) { return { row: Math.floor(i / 3), col: i % 3 }; }

      // ── Detectar touch device ──
      const isTouch = "ontouchstart" in window || navigator.maxTouchPoints > 0;
      let currentExpanded = -1;

      // Promover cards a capas GPU
      cards.forEach(c => { c.style.willChange = "transform, width, height, border-radius"; });

      function expandCard(i) {
        if (i === currentExpanded) return; // ya expandida, no recalcular
        currentExpanded = i;
        const card = cards[i];
        const PUSH = card.offsetWidth * 0.22;
        const { row: ar, col: ac } = getPos(i);
        cards.forEach((other, j) => {
          other.classList.remove("expanded");
          if (i === j) {
            other.classList.add("expanded");
            other.style.transform = "translate3d(0,0,0)";
          } else {
            const { row: br, col: bc } = getPos(j);
            const dr = br - ar, dc = bc - ac;
            const len = Math.sqrt(dr * dr + dc * dc);
            other.style.transform = `translate3d(${(dc / len) * PUSH}px, ${(dr / len) * PUSH}px, 0)`;
          }
        });
      }

      function collapseAll() {
        if (currentExpanded === -1) return;
        cards.forEach(c => { c.classList.remove("expanded"); c.style.transform = ""; });
        currentExpanded = -1;
      }

      // Encontrar qué card está bajo un punto (x, y)
      function cardAtPoint(x, y) {
        for (let i = 0; i < cards.length; i++) {
          const r = cards[i].getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return i;
        }
        return -1;
      }

      if (isTouch) {
        // ── TOUCH: deslizar el dedo expande cards, levantar el dedo abre player ──
        let touchMoved = false;
        let lastTouchCard = -1;

        grid.addEventListener("touchstart", (e) => {
          touchMoved = false;
          const t = e.touches[0];
          const i = cardAtPoint(t.clientX, t.clientY);
          if (i !== -1) {
            expandCard(i);
            lastTouchCard = i;
          }
        }, { passive: true });

        grid.addEventListener("touchmove", (e) => {
          touchMoved = true;
          const t = e.touches[0];
          const i = cardAtPoint(t.clientX, t.clientY);
          if (i !== -1) {
            expandCard(i);
            lastTouchCard = i;
          } else {
            collapseAll();
            lastTouchCard = -1;
          }
        }, { passive: true });

        grid.addEventListener("touchend", (e) => {
          const cardIdx = lastTouchCard;
          // Pequeño delay para que se vea la expansión antes de abrir
          if (cardIdx !== -1 && cards[cardIdx].dataset.video) {
            const card = cards[cardIdx];
            const src = card.dataset.video;
            const ratio = card.dataset.ratio || "16/9";
            // Si no se movió mucho = tap directo → abrir
            // Si se movió y soltó encima → también abrir
            setTimeout(() => openPlayer(card, R2 + "/" + src, ratio), touchMoved ? 150 : 80);
          } else {
            collapseAll();
          }
          lastTouchCard = -1;
        }, { passive: true });

        // Prevenir que el click se dispare también (doble acción)
        grid.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); }, true);

      } else {
        // ── DESKTOP: hover expande, click abre player ──
        cards.forEach((card, i) => {
          card.addEventListener("mouseenter", () => expandCard(i));
          card.addEventListener("mouseleave", () => collapseAll());

          card.addEventListener("click", () => {
            if (!card.classList.contains("expanded")) return;
            const src = card.dataset.video;
            if (!src) return;
            const ratio = card.dataset.ratio || "16/9";
            openPlayer(card, R2 + "/" + src, ratio);
          });
        });
      }

      // Player
      const player   = document.getElementById("player");
      const playerV  = document.getElementById("player-v");
      const playerCl = document.getElementById("player-close");
      let   playerAnim = null;
      let   activeCard = null;
      let   activeRect = null;

      function openPlayer(card, src, ratio) {
        const [rw, rh] = ratio.split("/").map(Number);
        const rect = card.getBoundingClientRect();
        activeCard = card;
        activeRect = rect;

        const vw = window.innerWidth, vh = window.innerHeight;
        let tw, th;
        if (vw / vh > rw / rh) { th = vh; tw = th * rw / rh; }
        else                    { tw = vw; th = tw * rh / rw; }

        if (playerAnim) { playerAnim.cancel(); playerAnim = null; }

        // Player cubre todo el viewport
        player.classList.add("open");
        player.style.opacity = "0";

        // Video arranca en la posición/tamaño del card (relativo al viewport)
        playerV.style.position     = "absolute";
        playerV.style.left         = rect.left   + "px";
        playerV.style.top          = rect.top    + "px";
        playerV.style.width        = rect.width  + "px";
        playerV.style.height       = rect.height + "px";
        playerV.style.borderRadius = "50%";
        playerV.src = src;
        playerV.muted = false;
        playerV.play().catch(() => { playerV.muted = true; playerV.play().catch(() => {}); });

        card.classList.add("pressed");
        setTimeout(() => card.classList.remove("pressed"), 400);
        playerCl.style.opacity = "0";

        // Fade in del negro
        playerAnim = player.animate(
          [{ opacity: "0" }, { opacity: "1" }],
          { duration: 200, easing: "ease", fill: "forwards" }
        );

        // Video crece al tamaño correcto centrado
        playerV.animate([
          { left: rect.left+"px", top: rect.top+"px", width: rect.width+"px", height: rect.height+"px", borderRadius: "50%" },
          { left: ((vw-tw)/2)+"px", top: ((vh-th)/2)+"px", width: tw+"px", height: th+"px", borderRadius: "0px" }
        ], { duration: 550, easing: "cubic-bezier(0.4, 0, 0.2, 1)", fill: "forwards" });

        playerAnim.finished.then(() => {
          playerAnim.cancel();
          player.style.opacity = "1";
          playerAnim = null;
          playerCl.style.opacity = "1";
          // Fullscreen nativo — el browser maneja sizing y rotación
          const el = playerV;
          if      (el.requestFullscreen)       el.requestFullscreen();
          else if (el.webkitRequestFullscreen)  el.webkitRequestFullscreen();
          else if (el.webkitEnterFullscreen)    el.webkitEnterFullscreen(); // iOS Safari
        }).catch(() => {});
      }

      function closePlayer() {
        if (playerAnim) { playerAnim.cancel(); playerAnim = null; }
        playerCl.style.opacity = "0";
        playerV.pause();
        playerV.src = "";

        const anim = player.animate(
          [{ opacity: "1" }, { opacity: "0" }],
          { duration: 300, easing: "ease", fill: "forwards" }
        );
        playerAnim = anim;

        anim.finished.then(() => {
          anim.cancel();
          player.classList.remove("open");
          player.style.opacity = "";
          playerV.removeAttribute("style");
          playerAnim = null;
          activeCard = null;
          activeRect = null;
          vloop.currentTime = 0;
        }).catch(() => {});
      }

      playerCl.addEventListener("click", e => { e.stopPropagation(); closePlayer(); });
      player.addEventListener("click",   e => { if (e.target === player || e.target === playerV) closePlayer(); });

      // Si el usuario sale del fullscreen nativo (Escape / botón del browser), cerrar el player
      document.addEventListener("fullscreenchange",       () => { if (!document.fullscreenElement)       closePlayer(); });
      document.addEventListener("webkitfullscreenchange", () => { if (!document.webkitFullscreenElement) closePlayer(); });
    }

    // Freeze justo antes del último frame
    v.addEventListener("loadedmetadata", () => {
      const stopAt = v.duration - 0.04;

      v.addEventListener("timeupdate", () => {
        if (!frozen && v.currentTime >= stopAt) {
          v.pause();
          activate();
        }
      });
    });

    // Fallback por si timeupdate se lo pierde
    v.addEventListener("ended", () => {
      if (!frozen) activate();
    });

    v.play().catch(() => {});
  </script>
