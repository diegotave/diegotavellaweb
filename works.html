<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diego Tavella — Works</title>
  <link rel="stylesheet" href="works.css">
</head>
<body>

  <div id="stage">
    <video id="vloop" muted playsinline loop preload="auto">
      <source src="assets/videos/loopfondoworks.webm" type='video/webm; codecs="vp9"'>
    </video>
    <video id="v" muted playsinline preload="auto">
      <source src="assets/videos/introwork.webm" type='video/webm; codecs="vp9"'>
    </video>

    <!-- Botonera — oculta hasta activate() -->
    <div id="works-grid">
      <div class="card" data-video="WORKS/video1/video1reel.mp4" data-ratio="16/9">
        <div class="card__clip"><img class="card__thumb card__thumb--contain" src="https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev/WORKS/video1/thumbv1.png" alt=""><div class="card__overlay"><span class="card__title">demo reel</span></div></div>
        <div class="card__badge"></div>
      </div>
      <div class="card"><div class="card__clip"><div class="placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div></div>
      <div class="card"><div class="card__clip"><div class="placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div></div>
      <div class="card" data-video="WORKS/video4/video4.mp4" data-ratio="16/9"><div class="card__clip"><img class="card__thumb" src="https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev/WORKS/video4/thumbv4.png" alt=""><div class="card__overlay"><span class="card__title">trailer El Escuerzo</span></div></div><div class="card__badge card__badge--yellow"></div></div>
      <div class="card"><div class="card__clip"><div class="placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div></div>
      <div class="card"><div class="card__clip"><div class="placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div></div>
      <div class="card"><div class="card__clip"><div class="placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div></div>
      <div class="card"><div class="card__clip"><div class="placeholder"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M3 16l5-5 4 4 3-3 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div></div>
      <div class="card" data-video="WORKS/video9/video9.mp4" data-ratio="1/1"><div class="card__clip"><img class="card__thumb" src="https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev/WORKS/video9/thumbv9.png" alt=""></div></div>
    </div>

    <!-- Marco dentro del stage: position:absolute se ancla al stage, overflow:hidden lo contiene -->
    <div id="frame"></div>
  </div>

  <!-- Player — se monta sobre todo al hacer click en una card -->
  <div id="player">
    <video id="player-v" playsinline></video>
    <button id="player-close" aria-label="Cerrar">
      <svg viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <a id="home-btn" href="index.html?r=1" aria-label="Home">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 2L2 7.5V14h4v-4h4v4h4V7.5L8 2Z" fill="white"/>
    </svg>
  </a>

  <!-- El contenido de works se monta acá después del freeze -->
  <div id="works-content" hidden></div>

  <script>
    const R2    = "https://pub-5dae75b9216945058a34d5462aa57b48.r2.dev";
    const v     = document.getElementById("v");
    const vloop = document.getElementById("vloop");
    const stage = document.getElementById("stage");
    let frozen = false;

    function activate() {
      frozen = true;
      stage.classList.add("frozen");
      vloop.play().catch(() => {});
      v.style.opacity = "0";

      // Mostrar botonera con fade
      const grid = document.getElementById("works-grid");
      grid.classList.add("visible");

      // Interacción de las cards
      const cards = Array.from(grid.querySelectorAll(".card"));
      function getPos(i) { return { row: Math.floor(i / 3), col: i % 3 }; }

      cards.forEach((card, i) => {
        card.addEventListener("mouseenter", () => {
          const PUSH = card.offsetWidth * 0.22;
          const { row: ar, col: ac } = getPos(i);
          cards.forEach((other, j) => {
            other.classList.remove("expanded");
            if (i === j) {
              other.classList.add("expanded");
              other.style.transform = "";
            } else {
              const { row: br, col: bc } = getPos(j);
              const dr = br - ar, dc = bc - ac;
              const len = Math.sqrt(dr * dr + dc * dc);
              other.style.transform = `translate(${(dc / len) * PUSH}px, ${(dr / len) * PUSH}px)`;
            }
          });
        });
        card.addEventListener("mouseleave", () => {
          cards.forEach(c => { c.classList.remove("expanded"); c.style.transform = ""; });
        });

        // Click → player (solo si ya está expandido, es decir, el hover ya morfó el círculo)
        card.addEventListener("click", () => {
          if (!card.classList.contains("expanded")) return;
          const src = card.dataset.video;
          if (!src) return;
          const ratio = card.dataset.ratio || "16/9";
          openPlayer(card, R2 + "/" + src, ratio);
        });
      });

      // Player
      const player   = document.getElementById("player");
      const playerV  = document.getElementById("player-v");
      const playerCl = document.getElementById("player-close");
      let   playerAnim = null;
      let   activeCard = null;
      let   activeRect = null;

      function openPlayer(card, src, ratio) {
        const [rw, rh] = ratio.split("/").map(Number);
        const rect = card.getBoundingClientRect();
        activeCard = card;
        activeRect = rect;

        const vw = window.innerWidth, vh = window.innerHeight;
        let tw, th;
        if (vw / vh > rw / rh) { th = vh; tw = th * rw / rh; }
        else                    { tw = vw; th = tw * rh / rw; }

        if (playerAnim) { playerAnim.cancel(); playerAnim = null; }

        // Player cubre todo el viewport
        player.classList.add("open");
        player.style.opacity = "0";

        // Video arranca en la posición/tamaño del card (relativo al viewport)
        playerV.style.position     = "absolute";
        playerV.style.left         = rect.left   + "px";
        playerV.style.top          = rect.top    + "px";
        playerV.style.width        = rect.width  + "px";
        playerV.style.height       = rect.height + "px";
        playerV.style.borderRadius = "50%";
        playerV.src = src;
        playerV.muted = false;
        playerV.play().catch(() => { playerV.muted = true; playerV.play().catch(() => {}); });

        card.classList.add("pressed");
        setTimeout(() => card.classList.remove("pressed"), 400);
        playerCl.style.opacity = "0";

        // Fade in del negro
        playerAnim = player.animate(
          [{ opacity: "0" }, { opacity: "1" }],
          { duration: 200, easing: "ease", fill: "forwards" }
        );

        // Video crece al tamaño correcto centrado
        playerV.animate([
          { left: rect.left+"px", top: rect.top+"px", width: rect.width+"px", height: rect.height+"px", borderRadius: "50%" },
          { left: ((vw-tw)/2)+"px", top: ((vh-th)/2)+"px", width: tw+"px", height: th+"px", borderRadius: "0px" }
        ], { duration: 550, easing: "cubic-bezier(0.4, 0, 0.2, 1)", fill: "forwards" });

        playerAnim.finished.then(() => {
          playerAnim.cancel();
          player.style.opacity = "1";
          playerAnim = null;
          playerCl.style.opacity = "1";
        }).catch(() => {});
      }

      function closePlayer() {
        if (playerAnim) { playerAnim.cancel(); playerAnim = null; }
        playerCl.style.opacity = "0";
        playerV.pause();
        playerV.src = "";

        const anim = player.animate(
          [{ opacity: "1" }, { opacity: "0" }],
          { duration: 300, easing: "ease", fill: "forwards" }
        );
        playerAnim = anim;

        anim.finished.then(() => {
          anim.cancel();
          player.classList.remove("open");
          player.style.opacity = "";
          playerV.removeAttribute("style");
          playerAnim = null;
          activeCard = null;
          activeRect = null;
          vloop.currentTime = 0;
        }).catch(() => {});
      }

      playerCl.addEventListener("click", e => { e.stopPropagation(); closePlayer(); });
      player.addEventListener("click",   e => { if (e.target === player || e.target === playerV) closePlayer(); });
    }

    // Freeze justo antes del último frame
    v.addEventListener("loadedmetadata", () => {
      const stopAt = v.duration - 0.04;

      v.addEventListener("timeupdate", () => {
        if (!frozen && v.currentTime >= stopAt) {
          v.pause();
          activate();
        }
      });
    });

    // Fallback por si timeupdate se lo pierde
    v.addEventListener("ended", () => {
      if (!frozen) activate();
    });

    v.play().catch(() => {});
  </script>

</body>
</html>
